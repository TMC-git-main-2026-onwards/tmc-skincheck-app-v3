<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="theme-color" content="#395171">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The Mole Clinic — Skin Safety</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
/* ════════════════════════════════════════════════════════════════════
   TMC SkinCheck design tokens — real TMC palette (themoleclinic.co.uk)
   Documented in docs/design-system.md. 4pt spacing grid; Inter only.
   ════════════════════════════════════════════════════════════════════ */
:root{
  /* Brand */
  --tmc-navy:#395171;--tmc-blue:#006F96;--tmc-cyan:#05B1C0;
  --tmc-tint:#F0F6FC;--tmc-tint-teal:#D5EAED;
  /* Ramps */
  --navy-50:#F2F5F9;--navy-100:#E2E8F1;--navy-300:#94A5BD;--navy-700:#2E415B;--navy-800:#243349;
  --blue-50:#E6F1FB;--blue-100:#CCE4F0;--blue-700:#005A7A;--blue-800:#044C66;
  /* Neutrals (ink) — secondary text >= 4.5:1 on white */
  --ink-900:#1F2A37;--ink-700:#3A4654;--ink-500:#55606B;--ink-400:#7C8AA0;--ink-300:#9AA4B0;
  --line:#E1E8F0;--track:#E3E9F0;--surface:#ffffff;
  /* Status — the ONLY use of green/amber/orange/red (UV bands + risk meter) */
  --status-low-fg:#3B6D11;--status-low-bg:#EAF3DE;--status-low-arc:#639922;
  --status-mod-fg:#854F0B;--status-mod-bg:#FBF3DC;--status-mod-arc:#D99A21;
  --status-high-fg:#B4400F;--status-high-bg:#FDE8DC;--status-high-arc:#E06A2B;
  --status-vhigh-fg:#A32D2D;--status-vhigh-bg:#FBE3E3;--status-vhigh-arc:#C84040;
  --status-extreme-fg:#7C1D1D;--status-extreme-bg:#F6DADA;--status-extreme-arc:#8E2424;
  /* Type + shape */
  --font-body:'Inter',system-ui,-apple-system,sans-serif;
  --radius-sm:8px;--radius-md:12px;--radius-lg:16px;--radius-xl:24px;
  --dur:200ms;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:var(--font-body);background:var(--tmc-tint);color:var(--ink-900);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding-bottom:env(safe-area-inset-bottom)}
#app{min-height:100vh;overflow:hidden}
.icon{vertical-align:-3px;flex-shrink:0}
button{font-family:var(--font-body)}
:focus-visible{outline:2px solid var(--tmc-cyan);outline-offset:2px}
@keyframes fadeInUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{opacity:0;transform:translateX(32px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-32px)}to{opacity:1;transform:translateX(0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanLine{0%{transform:translateY(0);opacity:1}90%{opacity:1}100%{transform:translateY(180px);opacity:0}}
@keyframes bodyPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes nudgeIn{from{opacity:0;transform:translateY(-6px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeInUp var(--dur) ease-out forwards}
.animate-in-delay-1{animation:fadeInUp var(--dur) ease-out 60ms forwards;opacity:0}
.animate-in-delay-2{animation:fadeInUp var(--dur) ease-out 120ms forwards;opacity:0}
.animate-in-delay-3{animation:fadeInUp var(--dur) ease-out 180ms forwards;opacity:0}
.animate-in-delay-4{animation:fadeInUp var(--dur) ease-out 240ms forwards;opacity:0}
.screen-slide-right{animation:slideInRight 250ms ease-out forwards}
.screen-slide-left{animation:slideInLeft 250ms ease-out forwards}
@media (prefers-reduced-motion:reduce){*,*::before,*::after{animation:none!important;transition:none!important}}
/* ── Layout ── */
.screen{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.content{flex:1;padding:24px 20px 24px;overflow-y:auto}
.content-tight{padding:16px 20px 24px}
/* ── Header / progress (navy brand band: the white wordmark needs it) ── */
.header{display:flex;align-items:center;justify-content:space-between;padding:calc(12px + env(safe-area-inset-top,0px)) 20px 12px;background:var(--tmc-navy);position:sticky;top:0;z-index:100}
.header-back{width:44px;height:44px;border-radius:50%;border:none;background:rgba(255,255,255,.12);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:background var(--dur);color:#fff}
.header-back:hover{background:rgba(255,255,255,.22)}
.progress-bar{height:3px;background:var(--navy-100)}
.progress-fill{height:100%;background:var(--tmc-cyan);transition:width 400ms ease;border-radius:0 2px 2px 0}
.progress-label{font-size:12px;line-height:16px;color:var(--ink-400);text-align:center;padding:8px 20px 0;font-weight:600;letter-spacing:.06em;text-transform:uppercase}
.progress-microcopy{font-size:13px;color:var(--tmc-blue);text-align:center;padding:4px 20px 8px;font-weight:500}
/* ── Type scale ── */
.title-xl{font-size:30px;line-height:36px;font-weight:700;color:var(--tmc-navy);letter-spacing:-.02em}
.title-lg{font-size:24px;line-height:30px;font-weight:600;color:var(--tmc-navy);letter-spacing:-.01em}
.title-md{font-size:20px;line-height:26px;font-weight:600;color:var(--tmc-navy)}
.subtitle{font-size:17px;line-height:26px;color:var(--ink-500);margin-top:12px}
.subtitle-sm{font-size:15px;line-height:23px;color:var(--ink-500);margin-top:8px}
.label{font-size:12px;line-height:16px;font-weight:600;color:var(--ink-400);text-transform:uppercase;letter-spacing:.06em;margin-bottom:8px}
/* ── Buttons ── */
.btn-primary{width:100%;min-height:52px;padding:14px 24px;background:var(--tmc-blue);color:#fff;font-size:16px;font-weight:600;border:none;border-radius:var(--radius-md);cursor:pointer;transition:background var(--dur);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--blue-700)}
.btn-primary:active{background:var(--blue-800)}
.btn-primary:disabled{opacity:.45;cursor:not-allowed}
.btn-secondary{width:100%;min-height:52px;padding:13px 24px;background:transparent;color:var(--tmc-blue);font-size:15px;font-weight:600;border:1.5px solid var(--tmc-blue);border-radius:var(--radius-md);cursor:pointer;transition:background var(--dur);display:inline-flex;align-items:center;justify-content:center;gap:8px}
.btn-secondary:hover{background:var(--blue-50)}
.btn-ghost{background:none;border:none;color:var(--tmc-blue);font-size:14px;font-weight:600;cursor:pointer;padding:10px 0;transition:opacity var(--dur);min-height:44px}
.btn-ghost:hover{opacity:.75}
.bottom-action{position:sticky;bottom:0;margin-top:auto;padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--tmc-tint) 75%,transparent);z-index:90}
.bottom-action .btn-primary{max-width:440px;margin:0 auto;display:flex}
/* ── Cards (hairline elevation language — no shadows) ── */
.card{background:var(--surface);border-radius:var(--radius-lg);padding:16px;border:1px solid var(--line)}
.card-highlight{background:var(--surface);border-radius:var(--radius-lg);padding:20px;border:1.5px solid var(--tmc-blue)}
/* ── Option / answer rows ── */
.option-card{background:var(--surface);border:1.5px solid var(--line);border-radius:var(--radius-md);padding:14px 16px;min-height:56px;cursor:pointer;transition:border-color var(--dur),background var(--dur);display:flex;align-items:center;gap:14px;margin-bottom:10px}
.option-card:hover{border-color:var(--tmc-blue)}
.option-card.selected{border-color:var(--tmc-blue);background:var(--blue-50)}
.option-card .radio{width:22px;height:22px;border-radius:50%;border:1.5px solid var(--ink-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--dur)}
.option-card.selected .radio{border-color:var(--tmc-blue);background:var(--tmc-blue)}
.option-card.selected .radio::after{content:'';width:8px;height:8px;border-radius:50%;background:#fff}
.option-label{font-size:15px;line-height:23px;font-weight:500;color:var(--ink-900)}
.option-desc{font-size:13px;line-height:18px;color:var(--ink-500);margin-top:2px}
.option-checkbox{width:22px;height:22px;border-radius:6px;border:1.5px solid var(--ink-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all var(--dur)}
.option-card.selected .option-checkbox{border-color:var(--tmc-blue);background:var(--tmc-blue)}
.option-card.selected .option-checkbox::after{content:'✓';color:#fff;font-size:13px;font-weight:700}
/* ── Notes & callouts (one restrained treatment; filled tints = status only) ── */
.risk-nudge{background:var(--status-mod-bg);border-radius:var(--radius-sm);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin:4px 0 10px;animation:nudgeIn var(--dur) ease-out}
.risk-nudge-icon{color:var(--status-mod-fg);flex-shrink:0;line-height:1.4;display:flex;padding-top:1px}
.risk-nudge-text{font-size:13px;line-height:18px;color:var(--status-mod-fg)}
.photo-tip-row{display:flex;align-items:flex-start;gap:14px;background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-md);padding:14px 16px}
.photo-tip-emoji{color:var(--tmc-blue);flex-shrink:0;display:flex;padding-top:2px}
.photo-tip-body{font-size:13px;line-height:19px;color:var(--ink-500)}
.photo-tip-body strong{color:var(--ink-900);display:block;margin-bottom:2px;font-size:14px;font-weight:600}
/* ── ABCDE legacy screen ── */
.abcde-cards{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.abcde-card{display:flex;align-items:flex-start;gap:14px;background:var(--surface);border-radius:var(--radius-md);padding:16px;border:1.5px solid var(--line);transition:border-color var(--dur);cursor:pointer}
.abcde-card.checked{border-color:var(--tmc-blue);background:var(--blue-50)}
.abcde-letter{width:40px;height:40px;border-radius:50%;background:var(--tmc-navy);color:#fff;font-size:18px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.abcde-card.checked .abcde-letter{background:var(--tmc-blue)}
.abcde-title{font-size:14px;font-weight:600;color:var(--ink-900)}
.abcde-desc{font-size:13px;line-height:18px;color:var(--ink-500);margin-top:2px}
/* ── Consent ── */
.consent-row{display:flex;align-items:flex-start;gap:12px;margin-top:16px}
.consent-checkbox{width:22px;height:22px;border:1.5px solid var(--ink-300);border-radius:6px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all var(--dur);margin-top:2px}
.consent-checkbox.checked{background:var(--tmc-blue);border-color:var(--tmc-blue)}
.consent-checkbox.checked::after{content:'✓';color:#fff;font-size:14px;font-weight:700}
.consent-text{font-size:13px;line-height:19px;color:var(--ink-500)}
.consent-text strong{color:var(--ink-900)}
.consent-text a{color:var(--tmc-blue);text-decoration:underline}
.consent-icon{color:var(--tmc-blue);text-align:center;margin-bottom:16px;display:flex;justify-content:center}
.consent-info-box{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;line-height:19px;color:var(--ink-500);margin-top:12px}
.consent-success-box{background:var(--blue-50);border:1px solid var(--blue-100);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--tmc-blue);margin-top:12px;display:flex;gap:8px;align-items:flex-start}
/* ── Inputs ── */
.input-group{margin-bottom:16px}
.input-label{font-size:14px;font-weight:600;color:var(--ink-900);margin-bottom:6px;display:block}
.input-field{width:100%;height:48px;padding:12px 14px;border:1.5px solid var(--line);border-radius:10px;font-family:var(--font-body);font-size:15px;color:var(--ink-900);transition:border-color var(--dur),box-shadow var(--dur);background:var(--surface)}
.input-field:focus{outline:none;border-color:var(--tmc-blue);box-shadow:0 0 0 3px rgba(0,111,150,.15)}
.input-field::placeholder{color:var(--ink-300)}
/* ── Status tags ── */
.tag{display:inline-block;padding:4px 12px;border-radius:6px;font-size:12px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.tag-low{background:var(--status-low-bg);color:var(--status-low-fg)}
.tag-moderate{background:var(--status-mod-bg);color:var(--status-mod-fg)}
.tag-high{background:var(--status-high-bg);color:var(--status-high-fg)}
.tag-veryhigh{background:var(--status-vhigh-bg);color:var(--status-vhigh-fg)}
/* ── Welcome hero (navy brand band) ── */
.welcome-hero{background:var(--tmc-navy);border-radius:0 0 var(--radius-xl) var(--radius-xl);padding:calc(40px + env(safe-area-inset-top,0px)) 24px 36px;text-align:center;color:#fff}
.welcome-hero-logo{margin:0 auto 28px auto}
.welcome-hero .title-xl{color:#fff}
.welcome-hero .subtitle{color:rgba(255,255,255,.78)}
.welcome-stat{display:inline-flex;align-items:center;gap:8px;background:rgba(255,255,255,.12);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;line-height:18px;color:rgba(255,255,255,.92);margin-top:16px}
.welcome-social-proof{font-size:13px;color:rgba(255,255,255,.65);margin-top:10px}
.partner-lockup{font-size:11px;color:#AEBED2;display:inline-flex;align-items:center;gap:6px}
.partner-lockup b{color:#fff;font-weight:600}
.feature-list{margin-top:20px}
.feature-item{display:flex;align-items:flex-start;gap:14px;padding:12px 0}
.feature-icon{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;flex-shrink:0;background:var(--blue-50);color:var(--tmc-blue)}
.feature-icon-teal,.feature-icon-coral,.feature-icon-gold{background:var(--blue-50)}
.feature-title{font-size:15px;font-weight:600;color:var(--ink-900)}
.feature-desc{font-size:13px;line-height:19px;color:var(--ink-500);margin-top:2px}
.disclaimer{background:var(--surface);border:1px solid var(--line);border-radius:var(--radius-sm);padding:14px 16px;font-size:13px;line-height:19px;color:var(--ink-500);margin-top:20px}
.disclaimer strong{color:var(--ink-900)}
.trust-badge{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-500);margin-top:16px;justify-content:center}
/* ── Loading ── */
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 24px}
.loading-body-wrap{position:relative;width:100px;height:200px;margin-bottom:28px}
.loading-scan-line{position:absolute;left:0;top:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--tmc-cyan),transparent);border-radius:2px;animation:scanLine 1.8s ease-in-out infinite}
.loading-body-svg{animation:bodyPulse 1.8s ease-in-out infinite}
.loading-msg{font-size:15px;color:var(--ink-500);animation:fadeIn var(--dur) ease-out;min-height:22px}
.divider{height:1px;background:var(--line);margin:20px 0}
.screen-footer{text-align:center;padding:12px 20px 8px;font-size:13px;color:var(--ink-400);border-top:1px solid var(--line)}
.screen-footer a{color:var(--ink-400);text-decoration:none}
.screen-footer a:hover{color:var(--tmc-blue)}
/* ── Toggles ── */
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0}
.toggle-switch{position:relative;display:inline-block;width:52px;height:28px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:var(--ink-300);border-radius:28px;transition:background var(--dur)}
.toggle-slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:#fff;border-radius:50%;transition:transform var(--dur)}
input:checked+.toggle-slider{background:var(--tmc-blue)}
input:checked+.toggle-slider:before{transform:translateX(24px)}
.toggle-label-text{font-size:15px;font-weight:600;color:var(--ink-900)}
.toggle-label-sub{font-size:13px;color:var(--ink-500);margin-top:2px}
/* ── Results / homepage ── */
.hp-screen{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--tmc-tint)}
.hp-header{background:var(--tmc-navy);padding:calc(16px + env(safe-area-inset-top,0px)) 20px 18px;color:#fff}
.hp-brand-row{display:flex;align-items:center;justify-content:space-between;padding-bottom:10px;border-bottom:1px solid rgba(255,255,255,.15)}
.hp-logo img{height:44px;width:auto;display:block}
.hp-reset-link{font-size:11px;color:rgba(255,255,255,.45);cursor:pointer;background:none;border:none;text-decoration:underline;padding:8px 0}
.hp-reset-link:hover{color:rgba(255,255,255,.75)}
.hp-greeting{font-size:23px;line-height:29px;font-weight:600;color:#fff;margin-top:14px}
.hp-meta{display:flex;align-items:center;gap:8px;margin-top:6px;flex-wrap:wrap}
.hp-date{font-size:12px;color:#C7D3E2}
.hp-location{font-size:12px;color:#C7D3E2;display:flex;align-items:center;gap:4px}
.hp-content{flex:1;padding:18px 18px 32px;overflow-y:auto}
.hp-section-label{font-size:12px;line-height:16px;font-weight:600;color:var(--ink-400);text-transform:uppercase;letter-spacing:.06em;margin:20px 0 8px}
.hp-section-label:first-child{margin-top:0}
/* UV card */
.uv-card{background:var(--surface);border-radius:var(--radius-lg);padding:16px;border:1px solid var(--line);margin-bottom:4px}
.uv-gauge-row{display:flex;align-items:center;gap:16px}
.uv-value-row{display:flex;align-items:baseline;gap:6px}
.uv-value{font-size:26px;font-weight:600;color:var(--tmc-navy);line-height:1}
.uv-value-label{font-size:12px;color:var(--ink-400)}
.uv-level-badge{display:inline-block;margin-top:4px;padding:2px 8px;border-radius:6px;font-size:11px;font-weight:600;letter-spacing:.04em;text-transform:uppercase}
.uv-spf-rec{background:var(--tmc-tint);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;line-height:20px;color:var(--ink-500);margin-top:12px}
.uv-spf-rec strong{color:var(--tmc-blue)}
.uv-spf-note{font-size:12px;color:var(--ink-400);margin-top:4px}
.uv-peak-alert{background:var(--status-mod-bg);border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:var(--status-mod-fg);font-weight:500;margin-top:10px;display:none;align-items:center;gap:8px}
.uv-weather-row{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--ink-500);margin-top:12px}
.uv-loading-state{text-align:center;padding:20px 0}
.uv-loading-spinner{width:28px;height:28px;border:3px solid var(--line);border-top-color:var(--tmc-blue);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
.uv-unavailable{text-align:center;padding:16px 0;color:var(--ink-400);font-size:13px}
.uv-unavailable-icon{display:flex;justify-content:center;margin-bottom:8px;color:var(--ink-300)}
/* Travel banner — brand moment */
.travel-banner{background:var(--tmc-navy);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;color:#fff}
.travel-banner-title{font-size:15px;font-weight:600;margin-bottom:4px;display:flex;align-items:center;gap:8px}
.travel-banner-body{font-size:13px;line-height:19px;color:rgba(255,255,255,.85);margin-bottom:12px}
.travel-banner-actions{display:flex;gap:8px}
.travel-banner-book{flex:1;padding:12px;background:#fff;color:var(--tmc-navy);border:none;border-radius:var(--radius-sm);font-size:13px;font-weight:600;cursor:pointer;min-height:44px}
.travel-banner-dismiss{padding:12px 14px;background:rgba(255,255,255,.12);color:#fff;border:none;border-radius:var(--radius-sm);font-size:13px;cursor:pointer;min-height:44px}
/* Collapsibles */
.collapsible-header{display:flex;align-items:center;justify-content:space-between;cursor:pointer;padding:14px 16px;background:var(--surface);border-radius:var(--radius-md);border:1px solid var(--line);margin-bottom:2px;transition:background var(--dur);min-height:48px}
.collapsible-header:hover{background:var(--navy-50)}
.collapsible-title{font-size:14px;font-weight:600;color:var(--ink-900);display:flex;align-items:center;gap:8px}
.collapsible-chevron{color:var(--ink-300);transition:transform var(--dur);display:flex}
.collapsible-chevron.open{transform:rotate(180deg)}
.collapsible-body{overflow:hidden;max-height:0;transition:max-height 300ms ease-out,opacity var(--dur);opacity:0}
.collapsible-body.open{max-height:2600px;opacity:1;transition:max-height 400ms ease-in,opacity var(--dur)}
.collapsible-inner{padding:14px 0 4px}
.hp-gauge-wrap{margin:4px 0}
/* Risk meter — slim 4-segment bars */
.band-indicator{display:flex;gap:4px}
.band-seg{flex:1;height:6px;border-radius:3px;background:var(--track)}
.band-seg.band-low{background:var(--status-low-arc)}
.band-seg.band-moderate{background:var(--status-mod-arc)}

<script>
/*
 * CAMPAIGN CODES — B2B / occupational-health deployment (feedback 1.13)
 * =====================================================================
 * The campaign code is ADDITIVE, never a gate. Any alphanumeric code is
 * accepted, stored as profile.campaignCode and stamped on the saved
 * result and emailed summary so a future phase can aggregate
 * de-identified outcomes per employer/event. No code -> exact consumer
 * flow. Results never leave the device in this version; if aggregate
 * employer reporting is added later, the lawful basis and privacy
 * wording must be revisited against the TMC Privacy Policy.
 *
 * Codes that match a known partner additionally apply co-branding:
 *   NORTHWIND / NORTH2026 / NWT-STAFF      -> Northwind Travel (blue)
 *   MERIDIAN / MERIDIAN2026 / MHI-MEMBER   -> Meridian Health (purple)
 *
 * PARTNER_GATE_MODE (demo flag, default false):
 * Production stays additive/never-gated per feedback 1.13. Setting the
 * flag to true restores the strict partner demo: email domain AND
 * campaign/invite code must match the SAME partner — neither alone is
 * sufficient — with error messages for mismatched access attempts:
 *   Personal email + partner code -> "use your work email with this code"
 *   Company email  + no code      -> "please also enter your invite code"
 * See docs/b2b-roadmap.md for how to enable it.
 */
const PARTNER_GATE_MODE = false;
// ===== DATA =====
// Monk Skin Tone Scale (Ellis et al., Google / Harvard 2019) — 10 official tones
// fitzpatrickId maps each MST tone to nearest Fitzpatrick type for internal scoring only
const skinTypes=[
  {id:1,color:'#f6ede4',fitzpatrickId:1,score:6},{id:2,color:'#f3e7db',fitzpatrickId:1,score:6},
  {id:3,color:'#f7ead0',fitzpatrickId:2,score:5},{id:4,color:'#eadaba',fitzpatrickId:3,score:3},
  {id:5,color:'#d7bd96',fitzpatrickId:3,score:3},{id:6,color:'#a07e56',fitzpatrickId:4,score:2},
  {id:7,color:'#825c43',fitzpatrickId:5,score:1},{id:8,color:'#604134',fitzpatrickId:5,score:1},
  {id:9,color:'#3a312a',fitzpatrickId:6,score:0},{id:10,color:'#15120e',fitzpatrickId:6,score:0},
];
// Questionnaire — validated set authored by Annie Meharg and Anna Grodent
// (TMC clinical/compliance) across 5 clinical domains, plus the two
// sanctioned "Lifetime sun exposure" additions for the cumulative UV
// dimension (feedback 1.11). Do not alter or reweight the validated items.
const questions=[
  {id:'age',question:'What is your age range?',options:[
    {value:'under25',label:'Under 25'},{value:'25-34',label:'25–34'},
    {value:'35-44',label:'35–44'},{value:'45-54',label:'45–54'},
    {value:'55-64',label:'55–64'},{value:'65plus',label:'65+'}]},
  {id:'mole_freckle_profile',question:'Which option best describes your skin overall?',options:[
    {value:'very_few_moles_few_freckles',label:'I have very few or no moles, and very few freckles'},
    {value:'very_few_moles_many_freckles',label:'I have very few or no moles, but many freckles'},
    {value:'some_moles',label:'I have some moles'},
    {value:'lots_of_moles',label:'I have lots of moles'}]},
  {id:'mole_appearance',question:'If you have moles, do any of them look noticeably different from others?',options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'},
    {value:'no_moles',label:"I don't have any moles"},{value:'not_sure',label:"I'm not sure"}]},
  {id:'self_check_confidence',question:'How confident do you feel checking your moles for changes over time?',options:[
    {value:'confident',label:'I check regularly and feel confident noticing changes'},
    {value:'difficult',label:'I check sometimes but find it difficult, especially in certain areas'},
    {value:'dont_check',label:"I don't check my moles regularly"},
    {value:'no_moles',label:"I don't have moles"}]},
  {id:'personal_skin_cancer_history',question:'Have you ever been diagnosed with skin cancer?',options:[
    {value:'yes_melanoma',label:'Yes, melanoma'},
    {value:'yes_nmsc',label:'Yes, non-melanoma skin cancer (for example basal cell or squamous cell carcinoma)'},
    {value:'no',label:'No'}]},
  {id:'family_melanoma_history',question:'Has a close family member (parent, sibling, or child) been diagnosed with melanoma?',options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'},{value:'not_sure',label:"I'm not sure"}]},
  {id:'sun_damage_visible',
    section_heading:'SUN EXPOSURE & UV DAMAGE — Sun-related risk is relevant even if you have few or no moles',
    question:'Have you ever had sun exposure that caused noticeable skin damage? (For example redness, pain, blistering, peeling, or areas of rough or scaly skin)',
    options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'},{value:'not_sure',label:"I'm not sure"}]},
  {id:'longterm_sun_exposure',question:'Have you spent long periods of time working or spending leisure time outdoors over many years?',options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'}]},
  {id:'sunburn_history',question:'Have you experienced repeated or severe sunburns at any point in your life?',options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'},{value:'not_sure',label:"I'm not sure"}]},
  {id:'sunbed_use',question:'Have you ever used tanning beds or sunbeds, especially before the age of 35?',options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'}]},
  // LIFETIME SUN EXPOSURE — cumulative/chronic pathway (feedback 1.11).
  // These two questions feed calculateCumulativeUVScore ONLY. They are the
  // sanctioned additions and do not alter or reweight the validated
  // melanoma question set above.
  {id:'outdoor_work',
    section_heading:'LIFETIME SUN EXPOSURE — Everyday sun exposure builds up over a lifetime, even without sunburn',
    question:'Have you ever worked outdoors for a substantial part of your working life (e.g. construction, farming, grounds or landscaping, transport, sport or leisure instruction)?',
    options:[
      {value:'no',label:'No'},
      {value:'under5',label:'Yes, under 5 years'},
      {value:'5to15',label:'Yes, 5–15 years'},
      {value:'over15',label:'Yes, more than 15 years'}]},
  {id:'sunny_climate',question:'Have you lived for a year or more in a country with a hot, sunny climate (e.g. Australia, southern Europe, Africa, the Middle East, parts of Asia or the Americas)?',
    options:[
      {value:'no',label:'No'},
      {value:'up_to_5',label:'Yes, up to 5 years'},
      {value:'over_5',label:'Yes, more than 5 years'}]},
  {id:'new_changing_lesion',education:true,question:'Have you noticed a new or changing mark, a persistent spot, or an area of skin that looks or feels different?',options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'},{value:'not_sure',label:"I'm not sure"}]},
  {id:'lesion_symptoms',education:true,
    question:'Have you noticed any of the following in a mark, spot, or area on your skin?',
    instruction:'Select all that apply',
    multiselect:true,
    abcde_note:'The ABCDE criteria are used by dermatologists to assess moles (Friedman et al. 1985, JAMA).',
    options:[
      {value:'bleeding',label:'Bleeding'},
      {value:'itching',label:'Itching'},
      {value:'crusting',label:'Crusting or a non-healing area (i.e. starts to heal but never quite does)'},
      {value:'_abcde_divider',label:'',divider:true},
      {value:'asymmetry',label:'A mole that is asymmetric (one half doesn\'t match the other)'},
      {value:'border',label:'Irregular, ragged or blurred edges on a mole'},
      {value:'colour',label:'A mole with uneven colour — shades of brown, black, red, white or blue. Melanoma can also be a single uniform colour that stands out as different from your other moles — most commonly black'},
      {value:'diameter',label:'A mole larger than 6mm (about the size of a pencil eraser)'},
      {value:'evolving',label:'A mole that has changed in size, shape, colour or feel'},
      {value:'none',label:'None of the above'}
    ]},
  {id:'reason_for_visit',question:"What best describes why you're using this tool today?",options:[
    {value:'routine',label:'Routine skin check'},
    {value:'specific_concern',label:"I'm concerned about one specific mole or lesion"},
    {value:'general_concern',label:'General concern about my skin'},
    {value:'family_advice',label:'Family history or advice from someone else'}]},
  {id:'immune_system',question:'Do you have a medical condition or treatment that affects your immune system?',options:[
    {value:'yes',label:'Yes'},{value:'no',label:'No'},{value:'not_sure',label:"I'm not sure"}]},
];
const riskNudges={
  new_changing_lesion:{yes:'A new or changing skin area should always be assessed by a specialist. Please book a professional skin check.'},
  personal_skin_cancer_history:{yes_melanoma:'A previous melanoma diagnosis means you are at significantly elevated risk. Regular professional monitoring is essential.'},
  family_melanoma_history:{yes:'Family history of melanoma is one of the strongest risk indicators. Regular professional checks are especially important.'},
  sunbed_use:{yes:'Sunbed use significantly increases skin cancer risk (WHO Group 1 carcinogen). A professional baseline check is recommended.'}
};
// clinics data + getNearestClinics now live in logic.js
const abcdeItems=[
  {letter:'A',title:'Asymmetry',desc:"One half of the mole doesn't match the other half."},
  {letter:'B',title:'Border',desc:'The edges are irregular, ragged, blurred, or notched.'},
  {letter:'C',title:'Colour',desc:'The colour is not uniform — shades of brown, black, red, white, or blue. Melanoma can also be a single uniform colour that stands out as different from your other moles — most commonly black.'},
  {letter:'D',title:'Diameter',desc:'The mole is larger than 6mm (about the size of a pencil eraser).'},
  {letter:'E',title:'Evolving',desc:'The mole is changing in size, shape, colour, or feel. New symptoms like itching or bleeding.'},
];
// ===== PARTNER COHORT REGISTRY =====
const PARTNERS = {
  northwind_travel: {
    key: 'northwind_travel',
    brandName: 'Northwind Travel',
    type: 'corporate',
    brandColor: '#0066B2',
    domains: ['northwindtravel.co.uk','northwind.co.uk'],
    inviteCodes: ['NORTH2026','NWT-STAFF','NORTHWIND']
  },
  meridian_health: {
    key: 'meridian_health',
    brandName: 'Meridian Health',
    type: 'insurer',
    brandColor: '#7C3AED',
    domains: ['meridianhealth.co.uk','meridian-health.co.uk'],
    inviteCodes: ['MERIDIAN2026','MHI-MEMBER','MERIDIAN']
  }
};
// Loose validation only (feedback 1.13): letters, digits, spaces, hyphens,
// underscores, up to 32 chars. An empty code is always fine.
const validateCampaignCode = (code) => {
  const c = (code || '').trim();
  return !c || /^[A-Za-z0-9][A-Za-z0-9 _-]{0,31}$/.test(c);
};
// A campaign code that matches a known partner applies co-branding.
// Unknown codes are still accepted — the code is never a gate (default mode).
const detectPartnerFromCode = (code) => {
  const c = (code || '').trim().toUpperCase();
  if (!c) return null;
  for (const [key, partner] of Object.entries(PARTNERS)) {
    if (partner.inviteCodes.some(ic => ic.toUpperCase() === c)) return key;
  }
  return null;
};
/*
 * Partner sponsor lockup (re-skin / §3B-lite).
 * Resolves the campaign code or a ?partner= deep link to a registry record
 * {displayName, logoUrl?, type:'employer'|'insurer'}. Unknown code -> generic
 * "Offered through your provider", no logo. Consumer (no code) -> null, no
 * lockup. TMC stays the clinical brand: no partner re-colouring.
 */
function resolvePartner(){
  const urlP=(new URLSearchParams(window.location.search).get('partner')||'').trim();
  const code=(st.campaignCode||(st.profile&&st.profile.campaignCode)||'').trim();
  const key=detectPartnerFromCode(urlP)||detectPartnerFromCode(code);
  if(key){
    const p=PARTNERS[key];
    return{displayName:p.brandName,logoUrl:p.logoUrl||null,type:p.type==='insurer'?'insurer':'employer'};
  }
  if(urlP||code)return{displayName:null,logoUrl:null,type:null,generic:true};
  return null;
}
// "Offered by {Partner}" — paired with the TMC wordmark on the navy brand
// band, sized never to overpower it
function renderPartnerLockup(){
  const p=resolvePartner();
  if(!p)return'';
  if(p.generic)return`<span class="partner-lockup">Offered through your provider</span>`;
  return`<span class="partner-lockup">${p.logoUrl?`<img src="${p.logoUrl}" alt="" style="height:16px;width:auto">`:''}Offered by <b>${p.displayName}</b></span>`;
}
/*
 * detectCohortStrict — used ONLY when PARTNER_GATE_MODE is true.
 * Both email domain AND campaign/invite code must match the SAME partner.
 * Neither alone is sufficient.
 * Returns: { cohort, valid, errorType?, error? }
 */
const detectCohortStrict = (email, code) => {
  const c = (code || '').trim().toUpperCase();
  const domain = (((email || '').split('@')[1]) || '').toLowerCase().trim();

  const codePartnerKey = detectPartnerFromCode(c);

  let domainPartnerKey = null;
  for (const [key, partner] of Object.entries(PARTNERS)) {
    if (domain && partner.domains.includes(domain)) { domainPartnerKey = key; break; }
  }

  if (codePartnerKey && domainPartnerKey && codePartnerKey === domainPartnerKey)
    return { cohort: codePartnerKey, valid: true };

  if (codePartnerKey && !domainPartnerKey)
    return { cohort: null, valid: false, errorType: 'code_without_domain',
      error: 'Please use your work or company email address with this invite code.' };

  if (domainPartnerKey && !codePartnerKey)
    return { cohort: null, valid: false, errorType: 'domain_without_code',
      error: "It looks like you're using a company email address. Please also enter your invite code to continue." };

  if (codePartnerKey && domainPartnerKey && codePartnerKey !== domainPartnerKey)
    return { cohort: null, valid: false, errorType: 'mismatch',
      error: 'Please use your work or company email address with this invite code.' };

  return { cohort: 'consumer', valid: true };
};

// UV gauge — compact half-arc per the design target: grey track, single
// progress arc in the EADO band colour, navy needle. Uses the same rounded
// UV value the UI displays (feedback 1.2).
function renderUVGaugeSVG(uv){
  const uvR=Math.min(Math.max(Math.round(uv||0),0),12);
  const band=getUVBand(uvR);
  const cx=55,cy=58,r=43;
  const frac=uvR/12;
  const a=Math.PI*(1-frac);
  const x=cx+r*Math.cos(a),y=cy-r*Math.sin(a);
  const large=frac>0.5?1:0;
  const nx=cx+(r-13)*Math.cos(a),ny=cy-(r-13)*Math.sin(a);
  return`<svg viewBox="0 0 110 64" width="100" height="58" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
    <path d="M12,58 A43,43 0 0,1 98,58" fill="none" stroke="var(--track,#E3E9F0)" stroke-width="8" stroke-linecap="round"/>
    ${uvR>0?`<path d="M12,58 A43,43 0 ${large},1 ${x.toFixed(1)},${y.toFixed(1)}" fill="none" stroke="${band.color}" stroke-width="8" stroke-linecap="round"/>`:''}
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="#395171" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="4" fill="#395171"/>
  </svg>`;
}

// Bullets are labelled by pathway where exposure-related (feedback 1.11):
// "Intermittent exposure" = melanoma pathway, "Cumulative sun exposure" =
// chronic/keratinocyte pathway, so the two-dimension result reads coherently
function getKeyRiskFactorBullets(answers,skinType,abcdeAnswers){
  const b=[];
  if(answers.new_changing_lesion==='yes')b.push('New or changing skin lesion noted');
  if(answers.family_melanoma_history==='yes')b.push('Family history of melanoma');
  if(answers.personal_skin_cancer_history==='yes_melanoma')b.push('Previous melanoma diagnosis');
  else if(answers.personal_skin_cancer_history==='yes_nmsc')b.push('Cumulative sun exposure: previous non-melanoma skin cancer');
  if(answers.sunburn_history==='yes')b.push('Intermittent exposure: history of repeated or severe sunburn');
  if(answers.sunbed_use==='yes')b.push('Intermittent exposure: sunbed use');
  const owLabels={under5:'under 5 years',['5to15']:'5–15 years',over15:'more than 15 years'};
  if(owLabels[answers.outdoor_work])b.push(`Cumulative sun exposure: ${owLabels[answers.outdoor_work]} of outdoor work`);
  const scLabels={up_to_5:'up to 5 years',over_5:'more than 5 years'};
  if(scLabels[answers.sunny_climate])b.push(`Cumulative sun exposure: ${scLabels[answers.sunny_climate]} living in a high-UV climate`);
  if(answers.sun_damage_visible==='yes')b.push('Cumulative sun exposure: visible sun damage on skin');
  if(answers.mole_freckle_profile==='lots_of_moles')b.push('High mole count');
  if(answers.mole_appearance==='yes')b.push('Moles that look noticeably different from others');
  const syms=answers.lesion_symptoms;
  if(Array.isArray(syms)&&syms.length>0&&!syms.includes('none')){
    const abcde=syms.filter(s=>['asymmetry','border','colour','diameter','evolving'].includes(s));
    if(abcde.length>0)b.push(`ABCDE concerns: ${abcde.join(', ')}`);
    const sItems=syms.filter(s=>['bleeding','itching','crusting'].includes(s));
    if(sItems.length>0)b.push(`Lesion symptoms: ${sItems.join(', ')}`);
  }
  if(skinType<=2)b.push('Very fair skin — highest UV sensitivity');
  if(b.length===0)b.push('No major risk factors identified in your profile');
  return b.slice(0,6);
}
function generateRecommendations(profile,wd){
  const recs=[];
  const{answers,skinType}=profile;
  const riskLevel=profile.overallRiskLevel||profile.riskLevel;
  const uv=wd&&wd.uv!=null?wd.uv:null;
  const hour=new Date().getHours();
  // getPersonalisedSPF is the single source of truth for SPF statements —
  // never contradict the UV card (feedback 1.2)
  if(uv!=null){
    const sp=getPersonalisedSPF(uv,skinType);
    if(sp.uvR>=3){
      recs.push(`Today's UV is ${sp.uvR} (${getUVBand(sp.uvR).level}). ${sp.msg} Reapply sunscreen every 2 hours when outdoors.`);
    }else{
      recs.push("Today's UV is low — no sun protection required. Check the UV index before extended time outdoors; protection is needed from UV 3 (EADO/WHO).");
    }
  }else{
    const m=new Date().getMonth();
    recs.push(m>=3&&m<=8
      ?'UV data is unavailable. At this time of year UK UV often reaches 3 or more from mid-morning — check the UV index before extended time outdoors.'
      :'UV data is unavailable. UK UV is typically low at this time of year, but check the index before extended time outdoors, winter sports or sunny trips — protection is needed from UV 3.');
  }
  if(answers.new_changing_lesion==='yes')
    recs.push('You reported a new or changing skin area. EADO guidance recommends any changing lesion be assessed by a dermatologist promptly. Do not delay booking a check.');
  if(answers.family_melanoma_history==='yes')
    recs.push('With a family history of melanoma, annual professional skin checks are strongly recommended — earlier and more frequently than the general population guideline (NHS guidance).');
  if(riskLevel==='VERY HIGH'||riskLevel==='HIGH')
    recs.push('Your risk profile indicates a professional full-body skin check is recommended. Early detection dramatically improves outcomes (NHS Cancer Research data).');
  else if(riskLevel==='MODERATE'&&!recs.some(r=>r.includes('annually')))
    recs.push('We recommend a professional skin check annually. Your profile includes factors that warrant regular monitoring by a qualified dermatologist.');
  if(answers.mole_freckle_profile==='lots_of_moles')
    recs.push('With a high mole count, keep a monthly photo log of any moles that change in size, shape, or colour. Use the ABCDE rule as your guide.');
  if(answers.longterm_sun_exposure==='yes')
    recs.push('Your high outdoor UV exposure means protective clothing (UPF 50+), a wide-brimmed hat, and UV-blocking sunglasses are your primary protection — with sunscreen on skin you cannot cover whenever UV is 3 or above.');
  if(hour>=11&&hour<=15&&uv!=null&&Math.round(uv)>=3)
    recs.push(`${icon('sun',14,'vertical-align:-2px')} You are currently in the peak UV window (11:00–15:00). Seek shade, wear a hat, and avoid prolonged direct sun exposure right now.`);
  if(skinType>=7&&!recs.some(r=>r.includes('melanoma risk')))
    recs.push('Research shows darker skin tones carry equal melanoma risk to lighter tones but face lower likelihood of early detection. Regular professional checks are equally important regardless of skin tone.');
  return recs.slice(0,5);
}

function renderArmOverlay(){

// MONK_TONES used only as reference — ITA method now primary classifier
const MONK_TONES = [
  { tone: 1,  r: 224, g: 199, b: 187 },
  { tone: 2,  r: 231, g: 206, b: 186 },
  { tone: 3,  r: 228, g: 202, b: 166 },
  { tone: 4,  r: 201, g: 171, b: 137 },
  { tone: 5,  r: 161, g: 128, b: 91  },
  { tone: 6,  r: 129, g: 93,  b: 58  },
  { tone: 7,  r: 113, g: 74,  b: 53  },
  { tone: 8,  r: 85,  g: 55,  b: 43  },
  { tone: 9,  r: 56,  g: 42,  b: 36  },
  { tone: 10, r: 47,  g: 39,  b: 34  }
];

/*
 * ITA-BASED MONK SKIN TONE CLASSIFICATION
 *
 * Uses the Individual Typology Angle (ITA) in CIELAB colour space.
 * ITA = arctan((L* - 50) / b*) × 180/π
 *
 * More robust to lighting variation than RGB Euclidean distance because:
 * - CIELAB separates lightness (L*) from colour information (a*, b*)
 * - The L* / b* ratio in ITA is more stable under illuminant changes than RGB
 * - Perceptually uniform colour space designed for this purpose
 *
 * Sources:
 * - Chardon et al. (1991). Int J Cosmetic Science, 13(4), 191-208.
 * - Ulrich et al. (2025). Nature npj Digital Medicine. PMC12179258.
 * - Jung et al. (2024). Skin Tone Map Generation. PMC11452249.
 * - Lipnick et al. (2026). British Journal of Dermatology, 194(1), e31.
 * - Monk, E. (2019). Monk Skin Tone Scale. Harvard/Google.
 */

// Convert sRGB (0-255) to CIELAB
// Uses D65 illuminant (standard daylight reference)
const rgbToLab = (r, g, b) => {
  // Step 1: sRGB to linear RGB (gamma correction)
  const linearise = (v) => {
    v = v / 255;
    return v <= 0.04045 ? v / 12.92 : Math.pow((v + 0.055) / 1.055, 2.4);
  };
  const lr = linearise(r);
  const lg = linearise(g);
  const lb = linearise(b);

  // Step 2: Linear RGB to XYZ (D65 illuminant matrix)
  const X = lr * 0.4124564 + lg * 0.3575761 + lb * 0.1804375;
  const Y = lr * 0.2126729 + lg * 0.7151522 + lb * 0.0721750;
  const Z = lr * 0.0193339 + lg * 0.1191920 + lb * 0.9503041;

  // Step 3: XYZ to CIELAB (D65 white point)
  const Xn = 0.95047, Yn = 1.00000, Zn = 1.08883;
  const f = (t) => t > 0.008856 ?
    Math.pow(t, 1/3) : (7.787 * t) + (16/116);
  const fx = f(X / Xn);
  const fy = f(Y / Yn);
  const fz = f(Z / Zn);

  const L = (116 * fy) - 16;
  const a = 500 * (fx - fy);
  const bLab = 200 * (fy - fz);

  return { L, a, b: bLab };
};

/*
 * RGB to YCbCr conversion
 * Used for skin pixel detection — separating skin from background.
 * Skin pixels across all tones fall within Cb=[77,127], Cr=[133,173]
 * Sources: Sobottka & Pitas (1996), Phung et al. (2005), Kolkur et al. (2017)
 */
const rgbToYCbCr = (r, g, b) => {
  const Y  =  0.299  * r + 0.587  * g + 0.114  * b;
  const Cb = -0.1687 * r - 0.3313 * g + 0.500  * b + 128;
  const Cr =  0.500  * r - 0.4187 * g - 0.0813 * b + 128;
  return { Y, Cb, Cr };
};

const isSkinPixel = (r, g, b) => {
  const { Cb, Cr } = rgbToYCbCr(r, g, b);
  return Cb >= 77 && Cb <= 127 && Cr >= 133 && Cr <= 173;
};

// Calculate ITA from CIELAB values
// ITA = arctan((L* - 50) / b*) × (180/π)
const calcITA = (L, bLab) => {
  if (Math.abs(bLab) < 0.001) bLab = 0.001; // avoid division by zero
  return Math.atan2(L - 50, bLab) * (180 / Math.PI);
};

// Map ITA angle to Monk Skin Tone (1-10)
// Thresholds from Chardon 1991 extended to 10-point Monk scale
const itaToMonk = (ita) => {
  if (ita > 55)  return 1;   // Very light
  if (ita > 48)  return 2;   // Light
  if (ita > 38)  return 3;   // Light-medium
  if (ita > 28)  return 4;   // Medium
  if (ita > 18)  return 4;   // Medium (upper)
  if (ita > 10)  return 5;   // Medium-tan
  if (ita > 0)   return 5;   // Tan
  if (ita > -10) return 6;   // Tan-brown
  if (ita > -20) return 6;   // Brown
  if (ita > -30) return 7;   // Deep brown
  if (ita > -42) return 8;   // Very deep brown
  if (ita > -55) return 9;   // Near-black brown
  return 10;                  // Deepest
};

/*
 * Resolves {tone, status} where status is one of:
 *   'ok'       — tone classified from in-ellipse skin pixels
 *   'lighting' — luminance spread indicates harsh shadows/overexposure;
 *                prompt a retake ("try facing a window")
 *   'no_skin'  — too few skin pixels inside the guide ellipse
 *   'error'    — image could not be decoded
 * Feedback 1.3: previously sampled a fixed centre rectangle, so beige
 * furniture (inside the YCbCr skin gamut) polluted the reading, and no
 * illumination correction was applied.
 */
const classifyMonkToneFromPixels = (imageDataURL) => {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const W = img.width;
      const H = img.height;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      // Grey-world illuminant estimate from the WHOLE frame (background
      // included). Estimating from the skin-only ellipse would neutralise
      // the skin colour itself and wreck the ITA, so the cast is estimated
      // globally and the correction applied to the sampled region. Gains
      // are clamped to avoid overcorrection from colourful backgrounds.
      const full = ctx.getImageData(0, 0, W, H).data;
      let fR = 0, fG = 0, fB = 0, fN = 0;
      for (let i = 0; i < full.length; i += 16) { fR += full[i]; fG += full[i+1]; fB += full[i+2]; fN++; }
      const grey = (fR + fG + fB) / (3 * fN);
      const clampGain = (g) => Math.min(1.4, Math.max(0.7, g));
      const gR = clampGain(grey / ((fR / fN) || 1));
      const gG = clampGain(grey / ((fG / fN) || 1));
      const gB = clampGain(grey / ((fB / fN) || 1));

      // Sample ONLY inside the same ellipse the capture overlay draws
      // (renderArmOverlay: cx=W/2, cy=H/2, rx=W*0.37, ry=H*0.22) so the
      // reading comes from the forearm, not the table behind it.
      const cx = W / 2, cy = H / 2, rx = W * 0.37, ry = H * 0.22;
      const x1 = Math.max(0, Math.round(cx - rx));
      const y1 = Math.max(0, Math.round(cy - ry));
      const sw = Math.min(W - x1, Math.round(rx * 2));
      const sh = Math.min(H - y1, Math.round(ry * 2));
      const pixels = ctx.getImageData(x1, y1, sw, sh).data;

      const itaValues = [];
      const lumas = [];
      for (let i = 0; i < pixels.length; i += 8) {
        const idx = i / 4;
        const px = idx % sw, py = Math.floor(idx / sw);
        const dx = (px + x1 - cx) / rx, dy = (py + y1 - cy) / ry;
        if (dx * dx + dy * dy > 1) continue; // outside the guide ellipse

        // Apply the global white-balance correction
        const r = Math.min(255, pixels[i]   * gR);
        const g = Math.min(255, pixels[i+1] * gG);
        const b = Math.min(255, pixels[i+2] * gB);
        const brightness = (r + g + b) / 3;

        // Skip overexposed and underexposed pixels
        if (brightness > 240 || brightness < 20) continue;

        // YCbCr skin pixel filter — rejects background, clothing, hair
        // Thresholds: Cb=[77,127], Cr=[133,173] (Sobottka & Pitas 1996,
        // confirmed Kolkur et al. 2017 across all skin tones)
        if (!isSkinPixel(r, g, b)) continue;

        // Convert to CIELAB and calculate ITA
        const lab = rgbToLab(r, g, b);
        const ita = calcITA(lab.L, lab.b);

        // ITA for skin ranges roughly from -90 to +90
        // Filter extreme values that are likely non-skin pixels
        if (ita < -80 || ita > 80) continue;

        itaValues.push(ita);
        lumas.push(lab.L);
      }

      if (itaValues.length < 10) {
        resolve({ tone: null, status: 'no_skin' });
        return;
      }

      // Lighting quality gate: a wide L* spread across sampled skin means a
      // harsh shadow or partial overexposure crosses the forearm — any tone
      // estimate would be unreliable, so ask for a retake instead.
      lumas.sort((a, b) => a - b);
      const lSpread = lumas[Math.floor(lumas.length * 0.90)] - lumas[Math.floor(lumas.length * 0.10)];
      if (lSpread > 30) {
        resolve({ tone: null, status: 'lighting' });
        return;
      }

      // Sort and take trimmed mean (middle 60%)
      // Removes outliers from clothing/background
      itaValues.sort((a, b) => a - b);
      const trimStart = Math.floor(itaValues.length * 0.20);
      const trimEnd   = Math.floor(itaValues.length * 0.80);
      let sum = 0;
      for (let i = trimStart; i < trimEnd; i++) sum += itaValues[i];
      const medianITA = sum / (trimEnd - trimStart);

      resolve({ tone: itaToMonk(medianITA), status: 'ok' });
    };
    img.onerror = () => resolve({ tone: null, status: 'error' });
    img.src = imageDataURL;
  });
};
const resizeImageForAnalysis = (dataURL) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const maxW = 1024;
    const s = img.width > maxW ? maxW / img.width : 1;
    const c = document.createElement('canvas');
    c.width = Math.round(img.width * s);
    c.height = Math.round(img.height * s);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    resolve(c.toDataURL('image/jpeg', 0.85));
  };
  img.src = dataURL;
});
const analyseArmPhoto = async (imageDataURL) => {
  const resized = await resizeImageForAnalysis(imageDataURL);
  // Run pixel sampling and worker call in parallel
  const [pixelResult, workerResult] = await Promise.allSettled([
    classifyMonkToneFromPixels(resized),
    (async () => {
      const [header, base64Data] = resized.split(',');
      const mimeType = header.match(/:(.*?);/)[1] || 'image/jpeg';
      const response = await fetch('https://tmc-skin-proxy.githubadmin-ff3.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({imageBase64: base64Data, mimeType})
      });
      if (!response.ok) throw new Error('Worker error ' + response.status);
      return await response.json();
    })()
  ]);
  const worker = workerResult.status === 'fulfilled' ? workerResult.value : null;
  const pixel = pixelResult.status === 'fulfilled' && pixelResult.value ? pixelResult.value : { tone: null, status: 'error' };
  // Worker Monk estimate for cross-checking the pixel reading (feedback 1.3).
  // Tolerates worker deployments that don't return monkToneEstimate yet.
  const workerTone = worker && worker.monkToneEstimate >= 1 && worker.monkToneEstimate <= 10
    ? Math.round(worker.monkToneEstimate) : null;
  let monkTone = null, monkToneSource = null, toneStatus = 'ok';
  if (pixel.status === 'lighting') {
    toneStatus = 'lighting';
  } else if (pixel.tone != null) {
    monkTone = pixel.tone;
    monkToneSource = 'pixel_sampling';
    // Pixel and worker estimates more than 2 tones apart: confidence is low —
    // prompt a retake rather than trusting either reading
    if (workerTone != null && Math.abs(workerTone - pixel.tone) > 2) toneStatus = 'mismatch';
  } else if (workerTone != null) {
    monkTone = workerTone;
    monkToneSource = 'worker';
  } else {
    // NO silent default — a fallback of tone 3 biases light (feedback 1.3).
    // A null tone routes the user to manual swatch selection.
    toneStatus = pixel.status || 'error';
  }
  return {
    monkTone,
    monkToneSource,
    toneStatus,
    workerTone,
    moleCount: worker ? worker.moleCount : -1,
    moleCountCategory: worker ? worker.moleCountCategory : 'under7',
    confidence: worker ? worker.confidence : 'low',
    lightingQuality: worker ? worker.lightingQuality : 'unknown',
    analysisNotes: worker ? worker.analysisNotes : 'Worker unavailable'

};
function handleAnalysisResult(result){

  st.skinAnalysis={mst,monkToneSource:result.monkToneSource||null,workerTone:result.workerTone??null,toneStatus:result.toneStatus,moleRaw,moleCountCategory:moleRaw,moleCount:result.moleCount!=null?result.moleCount:-1,moleCountAnswer,confidence,photoDataUrl:st.capturedPhoto};

function renderQuestionnaire(){
  const q=questions[st.currentQuestion];
  const sel=st.answers[q.id];
  const vis=questions.filter(vq=>!shouldSkipQuestion(vq));
  const isLastVis=vis[vis.length-1]?.id===q.id;
  const nudgeVal=q.multiselect?null:sel;
  const nudge=`<div id="qNudge">${riskNudges[q.id]&&nudgeVal&&riskNudges[q.id][nudgeVal]
    ?`<div class="risk-nudge"><div class="risk-nudge-icon">${icon('info',16)}</div><div class="risk-nudge-text">${riskNudges[q.id][nudgeVal]}</div></div>`:''}</div>`;
  const isDisabled=q.multiselect?(!Array.isArray(sel)||sel.length===0):!sel;
  let optionsHtml='';
  if(q.multiselect){
    const curSel=Array.isArray(sel)?sel:[];
    let passedDivider=false;
    optionsHtml=q.options.map(opt=>{
      if(opt.divider){
        passedDivider=true;
        return`<div class="abcde-divider">ABCDE mole assessment</div>`;
      }
      const checked=curSel.includes(opt.value);
      return`<div class="option-card ${checked?'selected':''}" data-answer="${opt.value}">
        <div class="option-checkbox"></div>
        <div><div class="option-label">${opt.label}</div></div>
      </div>`;
    }).join('');
    if(q.abcde_note)optionsHtml+=`<p class="abcde-note">${q.abcde_note}</p>`;
  }else{
    optionsHtml=q.options.map(opt=>`<div class="option-card ${sel===opt.value?'selected':''}" data-answer="${opt.value}">
      <div class="radio"></div>
      <div><div class="option-label">${opt.label}</div>${opt.desc?`<div class="option-desc">${opt.desc}</div>`:''}</div>
    </div>`).join('');
  }
  return`<div class="screen">
    ${renderHeader()}
    <div class="content" style="animation:slideInRight .3s ease-out">
      ${q.section_heading?`<div class="section-heading-pill">${q.section_heading}</div>`:''}
      <h2 class="title-lg">${q.question}</h2>
      ${q.subtitle?`<p class="subtitle-sm">${q.subtitle}</p>`:''}
      ${q.instruction?`<p class="subtitle-sm" style="font-style:italic">${q.instruction}</p>`:''}
      ${q.education?renderMoleEducationPanel():''}
      <div style="margin-top:20px">${optionsHtml}</div>
      ${nudge}
    </div>
    <div class="bottom-action"><button class="btn-primary" id="questionNext" ${isDisabled?'disabled':''}>${isLastVis?`Continue ${icon('chevron-right',18)}`:`Next Question ${icon('chevron-right',18)}`}</button></div>
    ${renderFooter()}
  </div>`;
}

  return`<div style="margin-top:14px">
    <div class="collapsible-header" onclick="toggleMoleEducation()">
      <div class="collapsible-title">${icon('search',16,'color:var(--tmc-blue)')} What does a suspicious mole look like?</div>

function toggleMoleEducation(){
  const col=document.getElementById('eduCollapse'),chev=document.getElementById('eduChevron');
  if(col){const open=col.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}
}
// In-place questionnaire update on answer selection — no full re-render, so
// the scroll position is preserved (feedback 1.8)
function refreshQuestionUI(){
  const q=questions[st.currentQuestion];
  const sel=st.answers[q.id];
  document.querySelectorAll('.option-card[data-answer]').forEach(c=>{
    const v=c.dataset.answer;
    const on=q.multiselect?(Array.isArray(sel)&&sel.includes(v)):sel===v;
    c.classList.toggle('selected',on);
  });
  const nudgeWrap=document.getElementById('qNudge');
  if(nudgeWrap){
    const nudgeVal=q.multiselect?null:sel;
    const msg=riskNudges[q.id]&&nudgeVal?riskNudges[q.id][nudgeVal]:null;
    nudgeWrap.innerHTML=msg?`<div class="risk-nudge"><div class="risk-nudge-icon">${icon('info',16)}</div><div class="risk-nudge-text">${msg}</div></div>`:'';
  }
  const btn=document.getElementById('questionNext');
  if(btn)btn.disabled=q.multiselect?(!Array.isArray(sel)||sel.length===0):!sel;
}

            <div class="methodology-inner">
              <div class="ref-item"><strong>Google Monk Skin Tone Scale (MST)</strong>Ellis Monk, Harvard University / Google, 2019. 10-point scale representing the full range of human skin tones. Skin tone is classified in this app from in-ellipse pixel sampling of the captured right-forearm photo using the Individual Typology Angle (ITA, Chardon et al. 1991) in CIELAB colour space, cross-checked against an AI estimate and confirmed by the user — objective colour measurement rather than visual estimation alone.</div>
              <div class="ref-item"><strong>Gandini et al. (2005) — Meta-analysis of risk factors for cutaneous melanoma</strong>European Journal of Cancer, 41(1), 28-44. First-degree relative with melanoma: RR 2.24. Very fair skin (Fitzpatrick I–II): RR 2.09. Sunbed use, sunburn history and UV exposure weights derived from this meta-analysis. Notably, intermittent exposure raises melanoma risk (OR ≈ 1.6) while chronic/occupational exposure does not (OR ≈ 0.95) — the basis for keeping the cumulative UV dimension separate from the melanoma score.</div>
              <div class="ref-item"><strong>Tucker et al. (1997) — Mole count as independent risk factor</strong>Journal of the National Cancer Institute. 50+ moles confers RR 4.8 versus fewer than 15 moles. Strongest modifiable risk predictor after family history.</div>
              <div class="ref-item"><strong>Bataille et al. (2015) — Arm Mole Count (King's College London)</strong>British Journal of Dermatology. DOI: 10.1111/bjd.14119. Mole count on the right arm predicts total body mole burden. 7–10 arm moles = ~50+ body moles; 11+ arm moles = elevated melanoma risk indicator. Used here to map AI mole count to body mole estimate.</div>
              <div class="ref-item"><strong>Bradford et al. (2010) — Second primary melanoma risk</strong>Journal of the National Cancer Institute. Previous melanoma diagnosis: RR 8.5 for second primary melanoma. Informs the elevated weight given to personal history of skin cancer.</div>
              <div class="ref-item"><strong>IARC Working Group (2006) — Sunbed carcinogenicity</strong>Lancet Oncology. Sunbed use before age 35 increases melanoma risk by 75% (RR 1.75). WHO classified sunbeds as Group 1 carcinogens (definitively carcinogenic to humans).</div>
              <div class="ref-item"><strong>Green et al. (1999) — Daily sunscreen and melanoma prevention</strong>Lancet. Randomised controlled trial (Queensland, Australia). Daily SPF 15 sunscreen reduces melanoma incidence by ~50% over 10 years. Informs the protective weighting applied to consistent sunscreen use.</div>
              <div class="ref-item"><strong>Friedman et al. (1985) — ABCDE criteria</strong>JAMA. The ABCDE rule (Asymmetry, Border, Colour, Diameter, Evolving) for clinical melanoma recognition. Each positive criterion is independently associated with malignant features; multiple criteria compound risk substantially.</div>
              <div class="ref-item"><strong>EADO UV Protection Guidelines</strong>European Association of Dermato-Oncology. Sun protection recommendations stratified by UV Index, implemented as the five-band EADO UV Protection Scale in this app. Priority order: avoid intentional tanning and sunbeds; shade and protective clothing as primary protection; sunscreen (SPF 30–50+, UVA label) as a supplementary measure for uncovered skin, needed only when the UV index is 3 or above.</div>
              <div class="ref-item"><strong>Brochez et al. (2026) — Messages for ultraviolet-radiation protection to fair-skinned populations</strong>Journal of the European Academy of Dermatology and Venereology, 40, 576–582. DOI: 10.1111/jdv.70148. EADO/EuroMelanoma/EuroSkin patient leaflet underpinning this app's UV-protection copy, including the UV-index-3 threshold and "skin damage from UV exposure builds up over time… even if you don't get sunburn". Draws on the consensus paper: <em>Skin cancers are the most frequent cancers in fair-skinned populations, but we can prevent them</em>, European Journal of Cancer 2024, 204, 114074.</div>
              <div class="ref-item"><strong>Whiteman et al. — Divergent-pathway model of cutaneous melanoma</strong>Two largely independent UV-exposure routes: an intermittent/recreational pathway (sunburns, holidays, sunbeds, high naevus counts) associated with melanoma, and a chronic/cumulative pathway (lifetime UV dose) associated with keratinocyte cancers and lentigo maligna. This app scores the two pathways separately and reports the higher band.</div>
              <div class="ref-item"><strong>WHO — Ultraviolet radiation and skin cancer (Q&amp;A)</strong>World Health Organization. Non-melanoma skin cancers occur on chronically exposed sites, implying long-term repeated UV exposure as a major causal factor; the role of cumulative sun exposure in malignant melanoma is equivocal, but NMSC history and solar keratoses — markers of cumulative exposure — are associated with higher melanoma risk. Basis for the cumulative UV dimension and the UV-index-3 protection threshold.</div>
              <div class="ref-item"><strong>Cancer Research UK — Risks and causes of melanoma</strong>People exposed to strong sunlight intermittently (e.g. on holiday) are at greater melanoma risk than those regularly exposed, such as outdoor workers — supporting the separation of intermittent (melanoma) and cumulative (keratinocyte) pathways in this app.</div>
              <div class="ref-item"><strong>NHS Skin Cancer Prevention Guidelines</strong>NHS England. Evidence-based guidance on sun protection, risk factors, and early detection. Informs check frequencies and daily SPF advice throughout this app.</div>
              <div class="ref-item"><strong>Bias-Corrected Risk Weighting — Gadare et al., MIT (2026)</strong>AI models and risk tools trained predominantly on lighter skin tones systematically underestimate risk for darker tones. This app applies corrective adjustments: Monk Tones 1–3 receive a one-level-up SPF recommendation, Tones 7–10 receive an equality-of-risk note, and the risk scoring does not reduce scores for darker skin tones.</div>
              <div class="ref-item"><strong>YCbCr Skin Pixel Detection (Sobottka &amp; Pitas 1996; Kolkur et al. 2017)</strong>Skin pixel detection uses YCbCr colour space thresholds (Cb=[77,127], Cr=[133,173]) to exclude background, clothing and non-skin pixels before skin tone calculation. These thresholds hold across all human skin tones — from very fair to very dark — making them robust across the full Monk scale. Sources: Sobottka &amp; Pitas (1996); Phung et al. (2005); Kolkur et al. (2017).</div>
              <div class="ref-item" style="border-bottom:none"><em>This app is a risk profiling tool and does not constitute medical advice. For clinical assessment, consult a qualified dermatologist. The Mole Clinic recommends regular professional skin checks regardless of risk level.</em></div>
            </div>
          </div>
        </div>
