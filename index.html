  st.profileExpanded=!st.profileExpanded;
  const col=document.getElementById('profileCollapse'),chev=document.getElementById('profileChevron');
  if(col)col.classList.toggle('open',st.profileExpanded);
  if(chev)chev.classList.toggle('open',st.profileExpanded);
}
function toggleMethodology(){
  const col=document.getElementById('methCollapse'),chev=document.getElementById('methChevron');
  if(col){const open=col.classList.toggle('open');if(chev)chev.classList.toggle('open',open);}
}
// Band display helpers — status ramp only (feedback 1.5; design target)
function bandFgVar(band){
  return{LOW:'var(--status-low-fg)',MODERATE:'var(--status-mod-fg)',HIGH:'var(--status-high-fg)','VERY HIGH':'var(--status-vhigh-fg)'}[band]||'var(--ink-700)';
}
function bandLabel(band){
  return{LOW:'Low',MODERATE:'Moderate',HIGH:'High','VERY HIGH':'Very high'}[band]||band;
}
// Slim four-segment meter with the user's band filled, labels beneath
function renderRiskBandIndicator(band){
  const bands=['LOW','MODERATE','HIGH','VERY HIGH'];
  const cls={LOW:'band-low',MODERATE:'band-moderate',HIGH:'band-high','VERY HIGH':'band-veryhigh'};
  return`<div class="band-indicator">${bands.map(b=>`<div class="band-seg ${b===band?cls[b]:''}"></div>`).join('')}</div>
  <div class="band-labels">${bands.map(b=>`<span class="${b===band?'active':''}" ${b===band?`style="color:${bandFgVar(b)}"`:''}>${bandLabel(b)}</span>`).join('')}</div>`;
}
// ===== ASYNC HOMEPAGE INIT =====
function updateWeatherUI(wd,geo){
  const hour=new Date().getHours(),isPeak=hour>=11&&hour<=15;
  const uvR=Math.round(wd.uv);
  const band=getUVBand(uvR),spf=getPersonalisedSPF(wd.uv,st.profile.skinType),showPeak=isPeak&&uvR>=3;
  const loadEl=document.getElementById('hp-uv-loading'),dataEl=document.getElementById('hp-uv-data');
  if(loadEl)loadEl.style.display='none';if(dataEl)dataEl.style.display='block';
  const gaugeEl=document.getElementById('hp-uv-gauge');if(gaugeEl)gaugeEl.innerHTML=renderUVGaugeSVG(wd.uv);
  const valEl=document.getElementById('hp-uv-value');if(valEl)valEl.textContent=uvR;
  const lvlEl=document.getElementById('hp-uv-level');
  if(lvlEl){lvlEl.textContent=band.level;lvlEl.style.background=band.bg;lvlEl.style.color=band.text;lvlEl.style.display='block';}
  const spfEl=document.getElementById('hp-spf-msg');
  if(spfEl){spfEl.style.display='block';spfEl.innerHTML=buildSpfRecHtml(spf);}
  const peakEl=document.getElementById('hp-peak-uv');
  if(peakEl){peakEl.style.display=showPeak?'flex':'none';if(showPeak)peakEl.innerHTML=`${icon('sun',16)} You are in the peak UV window right now (11:00–15:00)`;}
  const wxEl=document.getElementById('hp-weather-summary');
  if(wxEl){wxEl.style.display='flex';wxEl.innerHTML=`${getWeatherEmoji(wd.weatherCode)}<span>${Math.round(wd.temp)}°C · ${getWeatherDesc(wd.weatherCode)}</span>`;}
  if(geo&&geo.city){
    st.currentCity=geo.city;
    const cityEl=document.getElementById('hp-city');if(cityEl)cityEl.textContent=geo.city;
    const cityWrap=document.getElementById('hp-city-wrap');if(cityWrap)cityWrap.style.display='flex';
  }
  st.weatherData=wd;
}
async function initHomepageAsync(){
  const p=st.profile;if(!p)return;
  if(p.consentLocation){
    const stale=!p.lat||!p.lon||!p.locationTimestamp||(Date.now()-p.locationTimestamp)>(4*60*60*1000);
    if(stale){
      try{
        const pos=await getCurrentPosition();
        const{latitude:lat,longitude:lon}=pos.coords;
        const geo=await reverseGeocode(lat,lon);
        const up={...st.profile,lat,lon,locationTimestamp:Date.now(),city:geo.city||st.profile.city,country:geo.country||st.profile.country,country_code:geo.country_code||st.profile.country_code,homeCountry:st.profile.homeCountry||(geo.country_code||geo.country)};
        saveProfile(up);st.profile=up;
        if(up.consentTravel&&geo.country){
          logLocationEntry(lat,lon,geo.country,geo.country_code);
          const ts=checkTravelStatus(up);
          if(ts.justReturned&&shouldShowTravelBanner()){
            st.showTravelBanner=true;
            const up2={...up,awayFromHome:false};saveProfile(up2);st.profile=up2;
            const banner=document.querySelector('.travel-banner');
            if(!banner){render();return;}
          }else if(ts.isAway&&!up.awayFromHome){
            const up2={...up,awayFromHome:true};saveProfile(up2);st.profile=up2;
          }
        }
        const wd=await fetchWeatherAndUV(lat,lon);
        if(wd)updateWeatherUI(wd,geo);return;
      }catch(e){}
    }
    if(p.lat&&p.lon){try{const wd=await fetchWeatherAndUV(p.lat,p.lon);if(wd)updateWeatherUI(wd,{city:p.city});}catch(e){}return;}
  }
  if(p.lat&&p.lon){try{const wd=await fetchWeatherAndUV(p.lat,p.lon);if(wd)updateWeatherUI(wd,{city:p.city});}catch(e){}return;}
  if(p.postcode){
    const coords=await fetchCoordinatesFromPostcode(p.postcode);
    if(coords){try{const wd=await fetchWeatherAndUV(coords.lat,coords.lon);if(wd){updateWeatherUI(wd,{city:`Based on your postcode (${p.postcode.toUpperCase()})`});return;}}catch(e){}}
    showPostcodeUVError(p);
  }
}
// ===== PROFILE MANAGEMENT =====
function buildProfile(){
  const serviceRecommendation=getServiceRecommendation(st.answers,st.cumulativeUVLevel);
  // campaignCode (feedback 1.13): optional B2B campaign/organisation tag,
  // stamped on the saved result and the emailed summary so a future phase
  // can aggregate de-identified outcomes per employer/event. There is NO
  // server-side reporting in this version — results stay on the device.
  const campaignCode=(st.campaignCode||'').trim().toUpperCase();
  // Gate mode: cohort requires domain+code to agree (invalid combos can't
  // pass the email screen). Default mode: code alone applies co-branding.
  const cohort=PARTNER_GATE_MODE
    ?(detectCohortStrict(st.email,campaignCode).cohort||'consumer')
    :(detectPartnerFromCode(campaignCode)||'consumer');
  const partnerInfo=(cohort!=='consumer'&&PARTNERS[cohort])?PARTNERS[cohort]:null;
  return{
    version:'0.4',name:st.name,email:st.email,postcode:st.postcode,
    campaignCode,cohort,partnerInfo,
    consentData:st.consentData,consentMarketing:st.consentMarketing,
    consentLocation:st.consentLocation,consentTravel:st.consentTravel,
    skinType:st.skinType,skinAnalysis:st.skinAnalysis||null,
    answers:{...st.answers},abcdeAnswers:{...st.abcdeAnswers},
    riskScore:st.riskScore,riskLevel:st.riskLevel,
    cumulativeUVScore:st.cumulativeUVScore,cumulativeUVLevel:st.cumulativeUVLevel,
    overallRiskLevel:st.overallRiskLevel,
    serviceRecommendation,
    lat:st.lat,lon:st.lon,city:st.city,country:st.country,country_code:st.country_code,
    homeCountry:st.country_code||(st.postcode?'gb':''),locationTimestamp:st.lat?Date.now():null,
    profileCreated:new Date().toISOString().split('T')[0],lastCheckDate:null,awayFromHome:false,
  };
}
function finishOnboarding(){
  // Two independent pathways (feedback 1.11): the validated melanoma score
  // and the cumulative UV score never mix; only the bands combine
  st.riskScore=calculateRiskScore(st.answers,st.abcdeAnswers,st.skinType,st.skinAnalysis);
  st.riskLevel=getRiskLevel(st.riskScore);
  st.cumulativeUVScore=calculateCumulativeUVScore(st.answers);
  st.cumulativeUVLevel=getCumulativeUVLevel(st.cumulativeUVScore);
  st.overallRiskLevel=combineRiskBands(st.riskLevel,st.cumulativeUVLevel);
  navigate('loading');
}
function startLoadingMessages(){
  const msgs=['Analysing your risk profile…','Comparing against UK skin cancer risk data…','Identifying your key risk factors…','Calculating personalised UV adjustments…','Preparing your Skin Safety Dashboard…'];
  let i=0;const msgEl=document.getElementById('loadingMsg');
  const iv=setInterval(()=>{
    i++;if(i<msgs.length&&msgEl){msgEl.style.animation='none';msgEl.offsetHeight;msgEl.style.animation='fadeIn .4s ease-out';msgEl.textContent=msgs[i];}
    if(i>=msgs.length-1){clearInterval(iv);setTimeout(()=>{const p=buildProfile();saveProfile(p);st.profile=p;navigate('homepage');},900);}
  },900);
}
function dismissTravelBanner(){setTravelDismissed();st.showTravelBanner=false;const b=document.querySelector('.travel-banner');if(b)b.remove();}
// "Not ready to book" exit path (feedback 1.7) — no guilt-trip copy.
// TODO: replace the mailto draft with a proper server-side send once a
// backend exists; there is no backend in v0.4.
function emailResultsDraft(){
  const p=st.profile;if(!p)return;
  const rec=p.serviceRecommendation||getServiceRecommendation(p.answers,p.cumulativeUVLevel);
  const factors=getKeyRiskFactorBullets(p.answers,p.skinType,p.abcdeAnswers);
  const overall=p.overallRiskLevel||p.riskLevel;
  const lines=[
    'TMC SkinCheck — your results summary',
    `Date: ${formatDateLong(new Date())}`,
    p.name?`Name: ${p.name}`:null,
    p.campaignCode?`Campaign code: ${p.campaignCode}`:null,
    '',
    `Overall risk category: ${overall}`,
    p.cumulativeUVLevel?`- Melanoma pathway: ${p.riskLevel}`:null,
    p.cumulativeUVLevel?`- Lifetime (cumulative) UV: ${p.cumulativeUVLevel}`:null,
    '',
    'Key factors:',
    ...factors.map(f=>`- ${f}`),
    '',
    `Recommended service: ${rec.title}`,
    `Recommended check frequency: ${getCheckFrequency(overall)}`,
    `Book online: ${BOOK_URLS[bookingKeyForRec(rec)]}`,
    '',
    'This is a risk category based on your answers — not a probability of developing skin cancer, and not a medical diagnosis.',
  ].filter(l=>l!=null);
  window.location.href=`mailto:${encodeURIComponent(p.email||'')}?subject=${encodeURIComponent('Your TMC SkinCheck results')}&body=${encodeURIComponent(lines.join('\n'))}`;
}
function doneForNow(){
  window.scrollTo({top:0,behavior:'smooth'});
  showToast('Your results are saved on this device.');
}
function showPostcodeUVError(p){
  const loadEl=document.getElementById('hp-uv-loading'),dataEl=document.getElementById('hp-uv-data');
  if(loadEl)loadEl.style.display='none';
  if(dataEl){dataEl.style.display='block';dataEl.innerHTML=`<div class="uv-unavailable"><div class="uv-unavailable-icon">${icon('triangle-alert',26)}</div><div style="font-size:14px;font-weight:600;color:var(--tmc-navy)">UV data unavailable</div><div style="margin-top:4px;font-size:12px">Enable location or check postcodes.io is available.</div><button class="btn-secondary" style="margin-top:12px;font-size:13px;padding:10px;min-height:44px" onclick="retryPostcodeUV()">${icon('refresh-cw',14)} Retry</button></div><div class="uv-spf-rec" style="margin-top:12px">${getDefaultSPFRec(p.skinType)}</div>`;}
}
async function retryPostcodeUV(){
  const p=st.profile;if(!p||!p.postcode)return;
  const loadEl=document.getElementById('hp-uv-loading'),dataEl=document.getElementById('hp-uv-data');
  if(loadEl){loadEl.style.display='block';loadEl.className='uv-loading-state';loadEl.innerHTML=`<div class="uv-loading-spinner"></div><div style="font-size:13px;color:var(--ink-400)">Retrying…</div><div class="uv-spf-rec" style="margin-top:12px">${getDefaultSPFRec(p.skinType)}</div>`;}
  if(dataEl)dataEl.style.display='none';
  const coords=await fetchCoordinatesFromPostcode(p.postcode);
  if(coords){try{const wd=await fetchWeatherAndUV(coords.lat,coords.lon);if(wd){updateWeatherUI(wd,{city:`Based on your postcode (${p.postcode.toUpperCase()})`});return;}}catch(e){}}
  showPostcodeUVError(p);
}
function resetProfile(){if(confirm('This will clear your profile and restart the questionnaire. Are you sure?')){clearProfile();stopCamera();window.activeCameraStream=null;Object.assign(st,{profile:null,screen:'welcome',history:['welcome'],weatherData:null,currentCity:'',skinAnalysis:null,capturedPhoto:null,cameraAnimFrame:null,toneRetryDone:false,skinType:null});render();}}
function afterLocationConsent(){if(st.consentLocation)navigate('consent_travel');else navigate('consent_notifications');}
// ===== MAIN RENDER =====
function render(){
  const app=document.getElementById('app');
  const dirClass=st.navDirection==='back'?'screen-slide-left':'screen-slide-right';
  let html='';
  switch(st.screen){
    case 'welcome':html=renderWelcome();break;
    case 'email':html=renderEmail();break;
    case 'consent':html=renderConsent();break;
    case 'arm_camera':html=renderArmCamera();break;
    case 'q_intro':html=renderQIntro();break;
    case 'questionnaire':html=renderQuestionnaire();break;
    case 'abcde':html=renderABCDE();break;
    case 'consent_location':html=renderConsentLocation();break;
    case 'consent_travel':html=renderConsentTravel();break;
    case 'consent_notifications':html=renderConsentNotifications();break;
    case 'loading':html=renderLoading();break;
    case 'homepage':html=renderHomepage();break;
    default:html=renderWelcome();
  }
  app.innerHTML=`<div class="${dirClass}">${html}</div>`;
  bindEvents();
  if(st.screen==='loading')startLoadingMessages();
  if(st.screen==='homepage')setTimeout(()=>{initHomepageAsync();initNearestClinicAsync();},100);
}
// ===== EVENT BINDING =====
function bindEvents(){
  // Email screen — the campaign code is additive and never gates the flow
  // (feedback 1.13); only nonsense characters are rejected
  const nameIn=document.getElementById('nameInput'),emailIn=document.getElementById('emailInput'),postIn=document.getElementById('postcodeInput'),campaignIn=document.getElementById('campaignInput'),emailNext=document.getElementById('emailNext');
  if(nameIn&&emailIn&&postIn&&emailNext){
    const chk=()=>{
      st.name=nameIn.value.trim();st.email=emailIn.value.trim();st.postcode=postIn.value.trim();st.campaignCode=campaignIn?campaignIn.value.trim():'';
      emailNext.disabled=!(st.name&&st.email.includes('@')&&st.email.includes('.')&&st.postcode.length>=2);
      const existing=document.getElementById('cohortError');if(existing)existing.remove();
    };
    nameIn.addEventListener('input',chk);emailIn.addEventListener('input',chk);postIn.addEventListener('input',chk);if(campaignIn)campaignIn.addEventListener('input',chk);
    emailNext.addEventListener('click',()=>{
      if(!validateCampaignCode(st.campaignCode)){showDetailsError('Campaign codes can only contain letters, numbers, spaces and hyphens (up to 32 characters). Check your code or leave it blank.');return;}
      if(PARTNER_GATE_MODE){
        const result=detectCohortStrict(st.email,st.campaignCode||'');
        if(!result.valid){showDetailsError(result.error);return;}
      }
      navigate('consent');
    });
    chk();
  }
  // Consent screen
  const consentDataEl=document.getElementById('consentData'),consentMktEl=document.getElementById('consentMarketing'),consentNext=document.getElementById('consentNext');
  if(consentDataEl)consentDataEl.addEventListener('click',()=>{st.consentData=!st.consentData;render();});
  if(consentMktEl)consentMktEl.addEventListener('click',()=>{st.consentMarketing=!st.consentMarketing;render();});
  if(consentNext)consentNext.addEventListener('click',()=>navigate('arm_camera'));
  // Questionnaire screen — answer selection updates the DOM in place rather
  // than re-rendering the screen, so the scroll position never jumps
  // (feedback 1.8, Chrome scroll-jump on answering)
  document.querySelectorAll('.option-card[data-answer]').forEach(c=>c.addEventListener('click',()=>{
    const q=questions[st.currentQuestion];
    const val=c.dataset.answer;
    if(q.multiselect){
      let cur=Array.isArray(st.answers[q.id])?[...st.answers[q.id]]:[];
      if(val==='none'){
        cur=cur.includes('none')?[]:['none'];
      }else{
        cur=cur.filter(v=>v!=='none');
        cur.includes(val)?cur=cur.filter(v=>v!==val):cur.push(val);
      }
      st.answers[q.id]=cur;
    }else{
      st.answers[q.id]=val;
    }
    refreshQuestionUI();
  }));
  const questionNext=document.getElementById('questionNext');
  if(questionNext)questionNext.addEventListener('click',()=>{
    let next=st.currentQuestion+1;
    while(next<questions.length&&shouldSkipQuestion(questions[next]))next++;
    if(next<questions.length){st.currentQuestion=next;window.scrollTo(0,0);render();}else navigate('consent_location');
  });
  // ABCDE screen (legacy — kept for back-nav compatibility)
  document.querySelectorAll('[data-abcde]').forEach(c=>c.addEventListener('click',()=>{st.abcdeAnswers[c.dataset.abcde]=!st.abcdeAnswers[c.dataset.abcde];render();}));
  // Location consent toggle
  const locToggle=document.getElementById('locationToggle');
  if(locToggle){
    locToggle.addEventListener('change',async()=>{
      if(locToggle.checked){
        try{
          const pos=await getCurrentPosition();
          st.consentLocation=true;st.lat=pos.coords.latitude;st.lon=pos.coords.longitude;
          const geo=await reverseGeocode(st.lat,st.lon);st.city=geo.city;st.country=geo.country;st.country_code=geo.country_code;
          render();
        }catch(e){locToggle.checked=false;st.consentLocation=false;showToast('Location permission denied');}
      }else{st.consentLocation=false;st.lat=null;st.lon=null;render();}
    });
  }
  // Travel consent toggle
  const travToggle=document.getElementById('travelToggle');
  if(travToggle)travToggle.addEventListener('change',()=>{st.consentTravel=travToggle.checked;});
}
// ===== DEV TOOLS =====
function devSimulateHolidayReturn(){
  const p=st.profile;if(!p)return;
  const now=Date.now();let h=getLocationHistory();
  for(let i=0;i<5;i++)h.push({lat:40.416775,lon:-3.703790,country:'Spain',country_code:'es',timestamp:now-(6-i)*24*60*60*1000});
  h.push({lat:51.46,lon:-0.306,country:'United Kingdom',country_code:'gb',timestamp:now});
  if(h.length>90)h=h.slice(-90);saveLocationHistory(h);
  const up={...p,awayFromHome:true,homeCountry:p.homeCountry||'gb'};saveProfile(up);st.profile=up;
  const ts=checkTravelStatus(up);
  if(ts.justReturned&&shouldShowTravelBanner()){
    const up2={...up,awayFromHome:false};saveProfile(up2);st.profile=up2;st.showTravelBanner=true;render();
  }else{showToast('Travel state: away='+ts.isAway+', returned='+ts.justReturned);}
}
function devResetTravel(){
  localStorage.removeItem('tmcLocationHistory');localStorage.removeItem('tmcTravelBannerDismissed');
  const p=st.profile;if(p){const up={...p,awayFromHome:false};saveProfile(up);st.profile=up;}
  st.showTravelBanner=false;const b=document.querySelector('.travel-banner');if(b)b.remove();showToast('Travel data reset');
}
// ===== INIT =====
function init(){
  // ?partner= deep link prefills the campaign code (B2B distribution links)
  const urlPartner=(new URLSearchParams(window.location.search).get('partner')||'').trim();
  if(urlPartner&&validateCampaignCode(urlPartner)&&!st.campaignCode)st.campaignCode=urlPartner.toUpperCase();
  const p=getProfile();
  // v0.4 adds the cumulative UV dimension (two new questions) — older
  // profiles lack those answers, so they restart the flow
  if(p&&p.version==='0.4'){
    st.profile=p;st.screen='homepage';st.history=['homepage'];
    if(p.awayFromHome&&shouldShowTravelBanner())st.showTravelBanner=true;
    render();
  }else{
    render();
  }
}
init();
</script>
