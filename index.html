<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#1a2332">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>The Mole Clinic — Skin Safety</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Fraunces:ital,opsz,wght@0,9..144,300;0,9..144,400;0,9..144,600;0,9..144,700;1,9..144,300;1,9..144,400&display=swap" rel="stylesheet">
<style>
:root{
  --tmc-navy:#1a2332;--tmc-navy-light:#243044;--tmc-teal:#2ec4b6;--tmc-teal-dark:#20a99c;
  --tmc-teal-light:#e8faf8;--tmc-coral:#e07a5f;--tmc-coral-light:#fdf0ec;
  --tmc-gold:#f2cc8f;--tmc-cream:#faf8f5;--tmc-white:#ffffff;
  --tmc-gray-100:#f5f5f5;--tmc-gray-200:#e8e8e8;--tmc-gray-300:#d1d1d1;
  --tmc-gray-400:#9a9a9a;--tmc-gray-600:#666666;--tmc-gray-800:#333333;
  --font-display:'Fraunces',Georgia,serif;--font-body:'DM Sans',-apple-system,sans-serif;
  --radius-sm:8px;--radius-md:12px;--radius-lg:20px;--radius-xl:28px;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow-md:0 4px 16px rgba(0,0,0,.1);
  --shadow-lg:0 8px 32px rgba(0,0,0,.12);
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{font-family:var(--font-body);background:var(--tmc-cream);color:var(--tmc-gray-800);min-height:100vh;-webkit-font-smoothing:antialiased;overflow-x:hidden}
body{padding-bottom:env(safe-area-inset-bottom)}
#app{min-height:100vh;overflow:hidden}
@keyframes fadeInUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes slideInRight{from{opacity:0;transform:translateX(48px)}to{opacity:1;transform:translateX(0)}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-48px)}to{opacity:1;transform:translateX(0)}}
@keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.05)}}
@keyframes pulseCTA{0%,100%{box-shadow:0 0 0 0 rgba(46,196,182,.5)}50%{box-shadow:0 0 0 10px rgba(46,196,182,0)}}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes scanLine{0%{transform:translateY(0);opacity:1}90%{opacity:1}100%{transform:translateY(180px);opacity:0}}
@keyframes bodyPulse{0%,100%{opacity:.6}50%{opacity:1}}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
@keyframes nudgeIn{from{opacity:0;transform:translateY(-8px)}to{opacity:1;transform:translateY(0)}}
.animate-in{animation:fadeInUp .5s ease-out forwards}
.animate-in-delay-1{animation:fadeInUp .5s ease-out .1s forwards;opacity:0}
.animate-in-delay-2{animation:fadeInUp .5s ease-out .2s forwards;opacity:0}
.animate-in-delay-3{animation:fadeInUp .5s ease-out .3s forwards;opacity:0}
.animate-in-delay-4{animation:fadeInUp .5s ease-out .4s forwards;opacity:0}
.screen-slide-right{animation:slideInRight .35s cubic-bezier(.4,0,.2,1) forwards}
.screen-slide-left{animation:slideInLeft .35s cubic-bezier(.4,0,.2,1) forwards}
.screen{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 20px 8px;background:var(--tmc-white);border-bottom:1px solid var(--tmc-gray-200);position:sticky;top:0;z-index:100}
.header-logo{font-family:var(--font-display);font-size:18px;font-weight:600;color:var(--tmc-navy);letter-spacing:-.3px}
.header-back{width:44px;height:44px;border-radius:50%;border:none;background:var(--tmc-gray-100);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;font-size:18px;color:var(--tmc-gray-600)}
.header-back:hover{background:var(--tmc-gray-200)}
.progress-bar{height:3px;background:var(--tmc-gray-200)}
.progress-fill{height:100%;background:linear-gradient(90deg,var(--tmc-teal),var(--tmc-teal-dark));transition:width .6s cubic-bezier(.4,0,.2,1);border-radius:0 2px 2px 0}
.progress-label{font-size:12px;color:var(--tmc-gray-400);text-align:center;padding:6px 20px 0;font-weight:500;letter-spacing:.5px;text-transform:uppercase}
.progress-microcopy{font-size:12px;color:var(--tmc-teal-dark);text-align:center;padding:3px 20px 6px;font-weight:500;font-style:italic}
.content{flex:1;padding:24px 20px 100px;overflow-y:auto}
.content-tight{padding:16px 20px 100px}
.title-xl{font-family:var(--font-display);font-size:32px;font-weight:600;color:var(--tmc-navy);line-height:1.2;letter-spacing:-.5px}
.title-lg{font-family:var(--font-display);font-size:26px;font-weight:600;color:var(--tmc-navy);line-height:1.25;letter-spacing:-.3px}
.title-md{font-family:var(--font-display);font-size:20px;font-weight:600;color:var(--tmc-navy);line-height:1.3}
.subtitle{font-size:16px;color:var(--tmc-gray-600);line-height:1.6;margin-top:12px}
.subtitle-sm{font-size:14px;color:var(--tmc-gray-600);line-height:1.5;margin-top:8px}
.label{font-size:13px;font-weight:600;color:var(--tmc-gray-400);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px}
.btn-primary{width:100%;padding:16px 24px;background:var(--tmc-teal);color:white;font-family:var(--font-body);font-size:16px;font-weight:600;border:none;border-radius:var(--radius-md);cursor:pointer;transition:all .25s;letter-spacing:.2px}
.btn-primary:hover{background:var(--tmc-teal-dark);transform:translateY(-1px);box-shadow:var(--shadow-md)}
.btn-primary:active{transform:translateY(0)}
.btn-primary:disabled{opacity:.4;cursor:not-allowed;transform:none;box-shadow:none}
.btn-secondary{width:100%;padding:14px 24px;background:transparent;color:var(--tmc-teal);font-family:var(--font-body);font-size:15px;font-weight:600;border:2px solid var(--tmc-teal);border-radius:var(--radius-md);cursor:pointer;transition:all .25s}
.btn-secondary:hover{background:var(--tmc-teal-light)}
.btn-ghost{background:none;border:none;color:var(--tmc-teal);font-family:var(--font-body);font-size:14px;font-weight:600;cursor:pointer;padding:8px 0;transition:opacity .2s}
.btn-ghost:hover{opacity:.7}
.bottom-action{position:fixed;bottom:0;left:0;right:0;padding:16px 20px;padding-bottom:calc(16px + env(safe-area-inset-bottom));background:linear-gradient(0deg,var(--tmc-cream) 70%,transparent);z-index:90}
.bottom-action .btn-primary{max-width:480px;margin:0 auto;display:block}
.card{background:var(--tmc-white);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-sm);border:1px solid var(--tmc-gray-200)}
.card-highlight{background:var(--tmc-white);border-radius:var(--radius-lg);padding:24px;box-shadow:var(--shadow-md);border:2px solid var(--tmc-teal)}
.option-card{background:var(--tmc-white);border:2px solid var(--tmc-gray-200);border-radius:var(--radius-md);padding:16px 20px;cursor:pointer;transition:all .2s;display:flex;align-items:center;gap:14px;margin-bottom:10px}
.option-card:hover,.option-card.selected{border-color:var(--tmc-teal);background:var(--tmc-teal-light)}
.option-card .radio{width:22px;height:22px;border-radius:50%;border:2px solid var(--tmc-gray-300);flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:all .2s}
.option-card.selected .radio{border-color:var(--tmc-teal);background:var(--tmc-teal)}
.option-card.selected .radio::after{content:'';width:8px;height:8px;border-radius:50%;background:white}
.option-label{font-size:15px;font-weight:500;color:var(--tmc-navy)}
.option-desc{font-size:13px;color:var(--tmc-gray-600);margin-top:2px}
.risk-nudge{background:var(--tmc-coral-light);border-radius:var(--radius-sm);padding:12px 14px;display:flex;gap:10px;align-items:flex-start;margin-top:4px;margin-bottom:10px;animation:nudgeIn .3s ease-out}
.risk-nudge-icon{font-size:16px;flex-shrink:0;line-height:1.4}
.risk-nudge-text{font-size:13px;color:#8b3a2a;line-height:1.5}
.photo-tip-row{display:flex;align-items:flex-start;gap:14px;background:var(--tmc-white);border:1px solid var(--tmc-gray-200);border-radius:var(--radius-md);padding:14px}
.photo-tip-emoji{font-size:22px;flex-shrink:0}
.photo-tip-body{font-size:13px;color:var(--tmc-gray-600);line-height:1.45}
.photo-tip-body strong{color:var(--tmc-navy);display:block;margin-bottom:2px;font-size:14px}
.abcde-cards{display:flex;flex-direction:column;gap:10px;margin-top:16px}
.abcde-card{display:flex;align-items:flex-start;gap:14px;background:var(--tmc-white);border-radius:var(--radius-md);padding:16px;border:1px solid var(--tmc-gray-200);transition:border-color .2s;cursor:pointer}
.abcde-card.checked{border-color:var(--tmc-coral);background:#fff8f6}
.abcde-letter{width:40px;height:40px;border-radius:50%;background:var(--tmc-navy);color:white;font-family:var(--font-display);font-size:20px;font-weight:700;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:background .2s}
.abcde-card.checked .abcde-letter{background:var(--tmc-coral)}
.abcde-title{font-size:14px;font-weight:600;color:var(--tmc-navy)}
.abcde-desc{font-size:13px;color:var(--tmc-gray-600);margin-top:2px;line-height:1.4}
.consent-row{display:flex;align-items:flex-start;gap:12px;margin-top:16px}
.consent-checkbox{width:22px;height:22px;border:2px solid var(--tmc-gray-300);border-radius:4px;flex-shrink:0;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all .2s;margin-top:2px}
.consent-checkbox.checked{background:var(--tmc-teal);border-color:var(--tmc-teal)}
.consent-checkbox.checked::after{content:'✓';color:white;font-size:14px;font-weight:700}
.consent-text{font-size:13px;color:var(--tmc-gray-600);line-height:1.5}
.consent-text a{color:var(--tmc-teal);text-decoration:underline}
.input-group{margin-bottom:16px}
.input-label{font-size:14px;font-weight:600;color:var(--tmc-navy);margin-bottom:6px;display:block}
.input-field{width:100%;padding:14px 16px;border:2px solid var(--tmc-gray-200);border-radius:var(--radius-sm);font-family:var(--font-body);font-size:15px;color:var(--tmc-navy);transition:border-color .2s;background:var(--tmc-white)}
.input-field:focus{outline:none;border-color:var(--tmc-teal)}
.input-field::placeholder{color:var(--tmc-gray-400)}
.clinic-card{background:var(--tmc-white);border-radius:var(--radius-md);padding:16px;border:1px solid var(--tmc-gray-200);display:flex;gap:14px;align-items:center;margin-bottom:10px;transition:all .2s}
.clinic-card:hover{border-color:var(--tmc-teal);box-shadow:var(--shadow-sm)}
.clinic-card.recommended{border:2px solid var(--tmc-teal)}
.clinic-icon{width:44px;height:44px;background:var(--tmc-teal-light);border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0}
.clinic-name{font-size:15px;font-weight:600;color:var(--tmc-navy)}
.clinic-distance{font-size:13px;color:var(--tmc-gray-600)}
.clinic-book-btn{background:var(--tmc-teal);color:white;border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:var(--font-body);font-size:13px;font-weight:600;cursor:pointer;white-space:nowrap;transition:background .2s;margin-left:auto;flex-shrink:0}
.clinic-book-btn:hover{background:var(--tmc-teal-dark)}
.service-card{background:linear-gradient(135deg,var(--tmc-navy),var(--tmc-navy-light));border-radius:var(--radius-lg);padding:24px;color:white;margin-bottom:16px;position:relative;overflow:hidden}
.service-card::before{content:'';position:absolute;top:-40px;right:-40px;width:160px;height:160px;border-radius:50%;background:radial-gradient(circle,rgba(46,196,182,.12) 0%,transparent 70%)}
.service-badge{display:inline-block;padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.5px;text-transform:uppercase;margin-bottom:10px}
.service-badge-rec{background:var(--tmc-teal);color:white}
.service-name{font-family:var(--font-display);font-size:22px;font-weight:600;margin-bottom:8px}
.service-desc{font-size:14px;opacity:.82;line-height:1.55}
.service-price{font-family:var(--font-display);font-size:26px;font-weight:700;color:var(--tmc-gold);margin-top:14px}
.risk-factor-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--tmc-gray-100);font-size:14px;color:var(--tmc-navy)}
.risk-factor-item:last-child{border-bottom:none}
.risk-factor-dot{width:8px;height:8px;border-radius:50%;background:var(--tmc-coral);flex-shrink:0;margin-top:5px}
.tag{display:inline-block;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.tag-low{background:#e8f5e9;color:#2e7d32}
.tag-moderate{background:#fff3e0;color:#e65100}
.tag-high{background:#fce4ec;color:#c62828}
.tag-veryhigh{background:#f3e5f5;color:#6a1b9a}
.welcome-hero{background:linear-gradient(160deg,var(--tmc-navy) 0%,#2a3f5a 50%,var(--tmc-navy-light) 100%);border-radius:0 0 var(--radius-xl) var(--radius-xl);padding:48px 24px 40px;text-align:center;color:white;position:relative;overflow:hidden}
.welcome-hero::before{content:'';position:absolute;top:-50%;right:-20%;width:300px;height:300px;border-radius:50%;background:radial-gradient(circle,rgba(46,196,182,.15) 0%,transparent 70%)}
.welcome-hero-logo{position:relative;z-index:1;margin:0 auto 32px auto}
.welcome-hero .title-xl{color:white;position:relative;z-index:1}
.welcome-hero .subtitle{color:rgba(255,255,255,.78);position:relative;z-index:1}
.welcome-stat{display:inline-block;background:rgba(255,255,255,.12);border-radius:var(--radius-sm);padding:8px 14px;font-size:13px;color:rgba(255,255,255,.9);margin-top:16px;position:relative;z-index:1;backdrop-filter:blur(4px)}
.welcome-social-proof{font-size:13px;color:rgba(255,255,255,.7);margin-top:10px;position:relative;z-index:1}
.feature-list{margin-top:24px}
.feature-item{display:flex;align-items:flex-start;gap:14px;padding:14px 0}
.feature-icon{width:40px;height:40px;border-radius:var(--radius-sm);display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0}
.feature-icon-teal{background:var(--tmc-teal-light)}
.feature-icon-coral{background:var(--tmc-coral-light)}
.feature-icon-gold{background:#fdf5e6}
.feature-title{font-size:15px;font-weight:600;color:var(--tmc-navy)}
.feature-desc{font-size:13px;color:var(--tmc-gray-600);margin-top:2px;line-height:1.4}
.disclaimer{background:var(--tmc-gray-100);border-radius:var(--radius-sm);padding:14px 16px;font-size:12px;color:var(--tmc-gray-600);line-height:1.5;margin-top:20px}
.disclaimer strong{color:var(--tmc-gray-800)}
.loading-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:70vh;text-align:center;padding:40px 24px}
.loading-body-wrap{position:relative;width:100px;height:200px;margin-bottom:28px}
.loading-scan-line{position:absolute;left:0;top:0;width:100%;height:3px;background:linear-gradient(90deg,transparent,var(--tmc-teal),transparent);border-radius:2px;animation:scanLine 1.8s ease-in-out infinite;box-shadow:0 0 8px var(--tmc-teal)}
.loading-body-svg{animation:bodyPulse 1.8s ease-in-out infinite}
.loading-msg{font-size:15px;color:var(--tmc-gray-600);animation:fadeIn .4s ease-out;min-height:22px}
.divider{height:1px;background:var(--tmc-gray-200);margin:20px 0}
.trust-badge{display:flex;align-items:center;gap:8px;font-size:12px;color:var(--tmc-gray-600);margin-top:16px;justify-content:center}
.screen-footer{text-align:center;padding:12px 20px 8px;font-size:11px;color:var(--tmc-gray-400);border-top:1px solid var(--tmc-gray-200);margin-top:auto}
.screen-footer a{color:var(--tmc-gray-400);text-decoration:none}
.screen-footer a:hover{color:var(--tmc-teal)}
.toggle-wrap{display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 0}
.toggle-switch{position:relative;display:inline-block;width:52px;height:28px;flex-shrink:0}
.toggle-switch input{opacity:0;width:0;height:0;position:absolute}
.toggle-slider{position:absolute;cursor:pointer;top:0;left:0;right:0;bottom:0;background:#ccc;border-radius:28px;transition:.3s}
.toggle-slider:before{position:absolute;content:"";height:22px;width:22px;left:3px;bottom:3px;background:white;border-radius:50%;transition:.3s;box-shadow:0 1px 4px rgba(0,0,0,.2)}
input:checked+.toggle-slider{background:var(--tmc-teal)}
input:checked+.toggle-slider:before{transform:translateX(24px)}
.toggle-label-text{font-size:15px;font-weight:600;color:var(--tmc-navy)}
.toggle-label-sub{font-size:12px;color:var(--tmc-gray-600);margin-top:2px}
.hp-screen{max-width:480px;margin:0 auto;min-height:100vh;display:flex;flex-direction:column;background:var(--tmc-cream)}
.hp-header{background:linear-gradient(160deg,var(--tmc-navy) 0%,#1e3250 100%);padding:48px 20px 28px;position:relative;overflow:hidden}
.hp-header::before{content:'';position:absolute;top:-30%;right:-15%;width:200px;height:200px;border-radius:50%;background:radial-gradient(circle,rgba(46,196,182,.12) 0%,transparent 70%)}
.hp-logo{margin-bottom:14px;position:relative;z-index:1;display:flex;align-items:center;justify-content:space-between}
.hp-logo img{height:60px;width:auto;display:block}
.hp-reset-link{font-size:11px;color:rgba(255,255,255,.4);cursor:pointer;background:none;border:none;font-family:var(--font-body);text-decoration:underline;padding:0}
.hp-reset-link:hover{color:rgba(255,255,255,.7)}
.hp-greeting{font-family:var(--font-display);font-size:28px;font-weight:600;color:white;line-height:1.2;position:relative;z-index:1}
.hp-meta{display:flex;align-items:center;gap:8px;margin-top:8px;position:relative;z-index:1;flex-wrap:wrap}
.hp-date{font-size:13px;color:rgba(255,255,255,.65)}
.hp-location{font-size:13px;color:rgba(255,255,255,.75);display:flex;align-items:center;gap:4px}
.hp-content{flex:1;padding:20px 16px 100px;overflow-y:auto}
.hp-section-label{font-size:11px;font-weight:700;color:var(--tmc-gray-400);text-transform:uppercase;letter-spacing:1.2px;margin:20px 0 10px}
.hp-section-label:first-child{margin-top:0}
.uv-card{background:var(--tmc-white);border-radius:var(--radius-lg);padding:20px;box-shadow:var(--shadow-md);border:1px solid var(--tmc-gray-200);margin-bottom:4px;overflow:visible}
.uv-gauge-wrap{display:flex;justify-content:center;margin-bottom:8px}
.uv-value-row{display:flex;align-items:baseline;justify-content:center;gap:8px;margin-bottom:6px}
.uv-value{font-family:var(--font-display);font-size:40px;font-weight:700;color:var(--tmc-navy);line-height:1}
.uv-value-label{font-size:12px;color:var(--tmc-gray-400);align-self:flex-end;padding-bottom:4px}
.uv-level-badge{display:inline-block;padding:5px 14px;border-radius:20px;font-size:12px;font-weight:700;letter-spacing:.5px;text-align:center;margin:0 auto 12px;display:block;width:fit-content;margin-left:auto;margin-right:auto}
.uv-spf-rec{background:var(--tmc-teal-light);border-radius:var(--radius-sm);padding:12px 14px;font-size:13px;color:var(--tmc-navy);line-height:1.5;margin-bottom:10px}
.uv-spf-rec strong{color:var(--tmc-teal-dark)}
.uv-spf-note{font-size:11px;color:var(--tmc-gray-600);font-style:italic;margin-top:4px}
.uv-peak-alert{background:#fff8e1;border:1px solid #ffe082;border-radius:var(--radius-sm);padding:10px 12px;font-size:13px;color:#f57f17;font-weight:500;margin-bottom:10px;display:none}
.uv-weather-row{display:flex;align-items:center;justify-content:center;gap:8px;font-size:15px;color:var(--tmc-gray-600);padding-top:8px;border-top:1px solid var(--tmc-gray-100)}
.uv-loading-state{text-align:center;padding:24px 0}
.uv-loading-spinner{width:28px;height:28px;border:3px solid var(--tmc-gray-200);border-top-color:var(--tmc-teal);border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 10px}
.uv-unavailable{text-align:center;padding:20px 0;color:var(--tmc-gray-400);font-size:13px}
.uv-unavailable-icon{font-size:28px;margin-bottom:8px}
.travel-banner{background:linear-gradient(135deg,#1a3a2a,#1e4d35);border-radius:var(--radius-lg);padding:16px;margin-bottom:16px;color:white;position:relative}
.travel-banner-title{font-size:15px;font-weight:700;margin-bottom:4px}
.travel-banner-body{font-size:13px;opacity:.85;line-height:1.5;margin-bottom:12px}
.travel-banner-actions{display:flex;gap:8px}

<div id="app"></div>
<script>
// ===== DATA =====
// Monk Skin Tone Scale (Ellis et al., Google / Harvard 2019) — 10 official tones
// fitzpatrickId maps each MST tone to nearest Fitzpatrick type for internal scoring only
const skinTypes=[
  {id:1,color:'#f6ede4',fitzpatrickId:1,score:6},{id:2,color:'#f3e7db',fitzpatrickId:1,score:6},
  {id:3,color:'#f7ead0',fitzpatrickId:2,score:5},{id:4,color:'#eadaba',fitzpatrickId:3,score:3},
  {id:5,color:'#d7bd96',fitzpatrickId:3,score:3},{id:6,color:'#a07e56',fitzpatrickId:4,score:2},
  {id:7,color:'#825c43',fitzpatrickId:5,score:1},{id:8,color:'#604134',fitzpatrickId:5,score:1},
  {id:9,color:'#3a312a',fitzpatrickId:6,score:0},{id:10,color:'#15120e',fitzpatrickId:6,score:0},
];
// Questionnaire — 11 questions, weighted scoring
// Scoring sourced from NHS skin cancer risk factor literature and EADO guidelines
const questions=[
  {id:'age',question:'What is your age range?',options:[
    {value:'under25',label:'Under 25',score:1},{value:'25-34',label:'25–34',score:2},
    {value:'35-44',label:'35–44',score:3},{value:'45-54',label:'45–54',score:4},
    {value:'55-64',label:'55–64',score:5},{value:'65plus',label:'65+',score:6}]},
  {id:'family_history',question:'Has anyone in your family been diagnosed with skin cancer?',subtitle:'Including melanoma or non-melanoma skin cancers',options:[
    {value:'yes_immediate',label:'Yes — immediate family',desc:'Parent, sibling, or child',score:8},
    {value:'yes_extended',label:'Yes — extended family',desc:'Grandparent, aunt, uncle, cousin',score:5},
    {value:'no',label:'No',score:0},{value:'unsure',label:"I'm not sure",score:3}]},
  {id:'personal_history',question:'Have you ever been diagnosed with skin cancer or had a suspicious mole removed?',options:[
    {value:'yes_cancer',label:'Yes — skin cancer diagnosis',score:10},
    {value:'yes_mole',label:'Yes — suspicious mole removed',score:7},
    {value:'no',label:'No',score:0}]},
  {id:'sunburn_history',question:'How often have you experienced sunburn in your life?',subtitle:'Including childhood sunburns',options:[
    {value:'frequently',label:'Frequently',desc:'Many times, including blistering burns',score:7},
    {value:'occasionally',label:'Occasionally',desc:'A fair number of times over the years',score:4},
    {value:'rarely',label:'Rarely',desc:'Once or twice',score:2},
    {value:'never',label:'Never or almost never',score:0}]},
  {id:'outdoor_work',question:'Does your job or lifestyle involve significant time outdoors?',options:[
    {value:'work_outdoor',label:'Yes — I work outdoors',desc:'Construction, farming, gardening, sports coaching, etc.',score:6},
    {value:'leisure_outdoor',label:'Yes — mostly leisure',desc:'Running, cycling, golf, hiking, sailing, etc.',score:4},
    {value:'both',label:'Both work and leisure',score:7},
    {value:'mostly_indoor',label:'Mostly indoors',score:1}]},
  {id:'sun_holidays',question:'How often do you take holidays in sunny climates?',subtitle:'Mediterranean, Caribbean, Australia, etc.',options:[
    {value:'3plus',label:'3 or more times a year',score:5},{value:'1-2',label:'1–2 times a year',score:3},
    {value:'occasionally',label:'Every couple of years',score:2},{value:'rarely',label:'Rarely or never',score:0}]},
  {id:'sunbed_use',question:'Have you ever used sunbeds?',options:[
    {value:'regularly',label:'Yes — regularly',desc:'Weekly or monthly use',score:8},
    {value:'occasionally',label:'Yes — occasionally',desc:'A few times',score:4},
    {value:'past',label:'Yes — but not anymore',desc:'Used to but stopped',score:3},
    {value:'never',label:'Never',score:0}]},
  {id:'mole_count',question:'Approximately how many moles do you have on your body?',options:[
    {value:'50plus',label:'50 or more',score:7},{value:'20-50',label:'20–50',score:5},
    {value:'10-20',label:'10–20',score:3},{value:'under10',label:'Fewer than 10',score:1}]},
  {id:'changing_moles',question:'Have you noticed any moles that have changed recently?',subtitle:'Changes in size, shape, colour, or feel',options:[
    {value:'yes_multiple',label:'Yes — more than one',score:9},
    {value:'yes_one',label:'Yes — one mole',score:7},
    {value:'unsure',label:"I'm not sure",score:4},{value:'no',label:'No',score:0}]},
  {id:'sunscreen_use',question:'How often do you use SPF sun protection?',options:[
    {value:'always',label:'Daily — year round',score:0},
    {value:'summer',label:'In summer or on sunny days',score:2},
    {value:'holiday',label:'Only on holiday',score:4},
    {value:'rarely',label:'Rarely or never',score:6}]},
  {id:'immune',question:'Do you take any medication that suppresses your immune system?',subtitle:'For example after organ transplant, or for autoimmune conditions',options:[
    {value:'yes',label:'Yes',score:6},{value:'no',label:'No',score:0},{value:'unsure',label:"I'm not sure",score:2}]},
];
const riskNudges={
  family_history:{yes_immediate:'Family history is one of the strongest risk indicators. Regular professional checks are especially important.'},
  changing_moles:{yes_multiple:'Changes in multiple moles should always be assessed by a specialist.'},
  sunbed_use:{regularly:'Regular sunbed use significantly increases skin cancer risk. A professional baseline check is recommended.'},
  sunburn_history:{frequently:'Frequent severe sunburn is a significant risk factor for melanoma.'}
};
const clinics=[
  {name:'London Marylebone',postcodes:['W1','NW','WC'],bookUrl:'https://www.themoleclinic.co.uk/book'},
  {name:'London City',postcodes:['EC','E1','E2'],bookUrl:'https://www.themoleclinic.co.uk/book'},
  {name:'London Chelsea',postcodes:['SW','KT','TW'],bookUrl:'https://www.themoleclinic.co.uk/book'},
  {name:'London Canary Wharf',postcodes:['E14','E'],bookUrl:'https://www.themoleclinic.co.uk/book'},
  {name:'Manchester',postcodes:['M','WA','SK','OL','BL','WN'],bookUrl:'https://www.themoleclinic.co.uk/book'},
  {name:'Leeds',postcodes:['LS','BD','HG','WF','HX','HD'],bookUrl:'https://www.themoleclinic.co.uk/book'},
  {name:'Bristol',postcodes:['BS','BA','GL','SN'],bookUrl:'https://www.themoleclinic.co.uk/book'},
  {name:'Birmingham',postcodes:['B','WS','DY','WV','CV'],bookUrl:'https://www.themoleclinic.co.uk/book'},
];
const abcdeItems=[
  {letter:'A',title:'Asymmetry',desc:"One half of the mole doesn't match the other half."},
  {letter:'B',title:'Border',desc:'The edges are irregular, ragged, blurred, or notched.'},
  {letter:'C',title:'Colour',desc:'The colour is not uniform — shades of brown, black, red, white, or blue.'},
  {letter:'D',title:'Diameter',desc:'The mole is larger than 6mm (about the size of a pencil eraser).'},
  {letter:'E',title:'Evolving',desc:'The mole is changing in size, shape, colour, or feel. New symptoms like itching or bleeding.'},
];
// mole_count is skipped in the questionnaire when AI analysis already detected it
function shouldSkipQuestion(q){
  return q.id==='mole_count'&&!!(st.skinAnalysis&&st.skinAnalysis.moleCountAnswer);
}
// ===== LOCALSTORAGE UTILITIES =====
function getProfile(){try{return JSON.parse(localStorage.getItem('tmcProfile'))}catch(e){return null}}
function saveProfile(p){try{localStorage.setItem('tmcProfile',JSON.stringify(p))}catch(e){}}
function getLocationHistory(){try{return JSON.parse(localStorage.getItem('tmcLocationHistory'))||[]}catch(e){return[]}}
function saveLocationHistory(h){try{localStorage.setItem('tmcLocationHistory',JSON.stringify(h))}catch(e){}}
function getTravelDismissed(){try{return parseInt(localStorage.getItem('tmcTravelBannerDismissed'))||0}catch(e){return 0}}
function setTravelDismissed(){try{localStorage.setItem('tmcTravelBannerDismissed',Date.now().toString())}catch(e){}}
function clearProfile(){try{localStorage.removeItem('tmcProfile')}catch(e){}}
// ===== UV & WEATHER LOGIC =====
// EADO (European Association of Dermato-Oncology) UV Protection Scale
function getUVBand(uv){
  if(uv<=2)return{level:'LOW',color:'#4caf50',bg:'#e8f5e9',text:'#2e7d32'};
  if(uv<=5)return{level:'MODERATE',color:'#ffb300',bg:'#fff8e1',text:'#f57f17'};
  if(uv<=7)return{level:'HIGH',color:'#ff7043',bg:'#fff3e0',text:'#bf360c'};
  if(uv<=10)return{level:'VERY HIGH',color:'#e53935',bg:'#ffebee',text:'#b71c1c'};
  return{level:'EXTREME',color:'#8e24aa',bg:'#f3e5f5',text:'#4a148c'};
}
// Bias-corrected SPF recommendation per Gadare et al., MIT 2026 debiasing principle:
// Monk tones 1-3 (lightest): move one EADO protection level up
// Monk tones 7-10 (darker): standard EADO + equality note
function getPersonalisedSPF(uv,monkTone){
  const levels=[
    {spf:null,msg:'No protection required'},
    {spf:'30+',msg:'SPF 30+, hat, and sunglasses'},
    {spf:'30–50',msg:'SPF 30–50, seek shade at solar noon'},
    {spf:'50+',msg:'SPF 50+, avoid solar noon, cover up'},
    {spf:'50+',msg:'SPF 50+, stay indoors at solar noon'},
  ];
  let idx=uv<=2?0:uv<=5?1:uv<=7?2:uv<=10?3:4;
  let note=null;
  if(monkTone<=3)idx=Math.min(idx+1,4);
  if(monkTone>=7)note='Darker skin tones have lower natural SPF but equal melanoma risk — do not rely on skin tone as protection. Use stated SPF.';
  return{...levels[idx],note};
}
// UV gauge SVG — half-circle arc with EADO-coloured band segments and needle
function renderUVGaugeSVG(uv){
  const cx=110,cy=100,r=88,sw=14;
  const d2r=d=>d*Math.PI/180;
  const pt=(a,rad)=>[cx+rad*Math.cos(d2r(a)),cy-rad*Math.sin(d2r(a))];
  const seg=(a1,a2,col)=>{const[x1,y1]=pt(a1,r),[x2,y2]=pt(a2,r);return`<path d="M${x1.toFixed(1)},${y1.toFixed(1)} A${r},${r} 0 0 1 ${x2.toFixed(1)},${y2.toFixed(1)}" stroke="${col}" stroke-width="${sw}" fill="none" stroke-linecap="butt"/>`;};
  const uvN=Math.min(Math.max(uv||0,0),12);
  const na=180-(uvN/12)*180;
  const[nx,ny]=pt(na,74);
  return`<svg viewBox="0 0 220 105" width="220" height="105" xmlns="http://www.w3.org/2000/svg">
    <path d="M22,${cy} A${r},${r} 0 0 1 198,${cy}" stroke="#e8e8e8" stroke-width="${sw}" fill="none"/>
    ${seg(180,150,'#4caf50')}${seg(150,105,'#ffb300')}${seg(105,75,'#ff7043')}${seg(75,30,'#e53935')}${seg(30,0,'#8e24aa')}
    <line x1="${cx}" y1="${cy}" x2="${nx.toFixed(1)}" y2="${ny.toFixed(1)}" stroke="#1a2332" stroke-width="2.5" stroke-linecap="round"/>
    <circle cx="${cx}" cy="${cy}" r="8" fill="#1a2332"/>
    <text x="22" y="${cy+18}" text-anchor="middle" font-family="DM Sans,sans-serif" font-size="9" fill="#4caf50" font-weight="600">LOW</text>
    <text x="198" y="${cy+18}" text-anchor="end" font-family="DM Sans,sans-serif" font-size="9" fill="#8e24aa" font-weight="600">EXTREME</text>
  </svg>`;
}
function getWeatherEmoji(code){
  if(code===0||code===1)return'&#9728;&#65039;';if(code===2)return'&#9925;';if(code===3)return'&#9729;&#65039;';
  if(code>=51&&code<=67)return'&#127783;&#65039;';if(code>=71&&code<=77)return'&#10052;&#65039;';
  if(code>=80&&code<=82)return'&#127782;&#65039;';if(code>=95)return'&#9928;&#65039;';return'&#127780;&#65039;';
}
function getWeatherDesc(code){
  const m={0:'Clear sky',1:'Mainly clear',2:'Partly cloudy',3:'Overcast',45:'Foggy',51:'Light drizzle',53:'Moderate drizzle',61:'Slight rain',63:'Moderate rain',65:'Heavy rain',71:'Light snow',80:'Light showers',81:'Moderate showers',95:'Thunderstorm'};
  return m[code]||'Variable';
}
async function fetchWeatherAndUV(lat,lon){
  try{
    const[uvRes,wxRes]=await Promise.all([
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=uv_index&timezone=auto`),
      fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current=temperature_2m,weather_code,wind_speed_10m&timezone=auto`)
    ]);
    const uvD=await uvRes.json(),wxD=await wxRes.json();
    return{uv:uvD.current.uv_index,temp:wxD.current.temperature_2m,weatherCode:wxD.current.weather_code,windSpeed:wxD.current.wind_speed_10m};
  }catch(e){return null;}
}
async function reverseGeocode(lat,lon){
  try{
    const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lon}&format=json`,{headers:{'Accept-Language':'en','User-Agent':'TMCSkinCheckApp/0.3'}});
    const d=await res.json();
    return{city:d.address.city||d.address.town||d.address.village||d.address.county||'',country:d.address.country||'',country_code:d.address.country_code||''};
  }catch(e){return{city:'',country:'',country_code:''};}
}
async function fetchCoordinatesFromPostcode(postcode){
  try{
    const pc=postcode.replace(/\s/g,'').toUpperCase();
    const res=await fetch(`https://api.postcodes.io/postcodes/${pc}`);
    const d=await res.json();
    if(d.status===200&&d.result)return{lat:d.result.latitude,lon:d.result.longitude};
    return null;
  }catch(e){return null;}
}
async function getCurrentPosition(){
  return new Promise((resolve,reject)=>{
    if(!navigator.geolocation){reject(new Error('Geolocation not supported'));return;}
    navigator.geolocation.getCurrentPosition(resolve,reject,{timeout:10000,enableHighAccuracy:false});
  });
}
// ===== TRAVEL DETECTION =====
function logLocationEntry(lat,lon,country,country_code){
  let h=getLocationHistory();
  h.push({lat,lon,country,country_code:country_code||'',timestamp:Date.now()});
  if(h.length>90)h=h.slice(-90);
  saveLocationHistory(h);
}
function checkTravelStatus(profile){
  const h=getLocationHistory();
  if(h.length<3)return{isAway:false,justReturned:false};
  const home=profile.homeCountry||'gb';
  const getCC=e=>e.country_code||e.country;
  const last3=h.slice(-3);
  const allAway=last3.every(e=>getCC(e)&&getCC(e)!==home);
  const currentCC=getCC(h[h.length-1]);
  const currentlyHome=currentCC===home;
  if(allAway)return{isAway:true,justReturned:false};
  if(profile.awayFromHome&&currentlyHome)return{isAway:false,justReturned:true};
  return{isAway:false,justReturned:false};
}
function shouldShowTravelBanner(){
  const dismissed=getTravelDismissed();
  if(!dismissed)return true;
  return(Date.now()-dismissed)>(30*24*60*60*1000);
}
// ===== RISK CALCULATIONS =====
/*
 * RISK SCORING MODEL — TMC Skin Check App v0.3
 * Based on published melanoma epidemiology literature.
 * Each weight reflects relative risk contribution from peer-reviewed sources.
 * This is a risk STRATIFICATION tool, not a diagnostic instrument.
 */
const calculateRiskScore = (answers, abcdeAnswers, skinType, skinAnalysis) => {
  let score = 0;

  // ── AGE ──────────────────────────────────────────────────────────────
  // Source: Cancer Research UK. Melanoma incidence by age.
  // Risk increases sharply from age 45. Peak incidence 55-64.
  const ageScores = {'under25':2,'25-34':5,'35-44':10,'45-54':16,'55-64':20,'65plus':22};
  score += ageScores[answers.age] || 0;

  // ── FAMILY HISTORY ───────────────────────────────────────────────────
  // Source: Gandini et al. (2005). Meta-analysis of risk factors for
  // cutaneous melanoma. European Journal of Cancer, 41(1), 28-44.
  // First-degree relative with melanoma: RR 2.24. Extended family: RR ~1.5.

function renderArmOverlay(){
  const canvas=document.getElementById('overlayCanvas');
  const video=document.getElementById('cameraVideo');
  if(!canvas||!video)return;
  if(canvas.offsetWidth===0){requestAnimationFrame(renderArmOverlay);return;}
  function draw(){
    if(!window.activeCameraStream)return;
    const vw=video.videoWidth||video.clientWidth||320;
    const vh=video.videoHeight||video.clientHeight||240;
    canvas.width=vw;canvas.height=vh;
    const ctx=canvas.getContext('2d');
    ctx.clearRect(0,0,vw,vh);
    const cx=vw/2,cy=vh/2,rx=vw*0.37,ry=vh*0.22;
    ctx.save();
    ctx.fillStyle='rgba(0,0,0,0.45)';
    ctx.fillRect(0,0,vw,vh);
    ctx.globalCompositeOperation='destination-out';
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.fill();
    ctx.restore();
    ctx.strokeStyle='rgba(46,196,182,0.88)';
    ctx.lineWidth=Math.max(2.5,vw*0.007);
    ctx.setLineDash([14,7]);
    ctx.beginPath();ctx.ellipse(cx,cy,rx,ry,0,0,Math.PI*2);ctx.stroke();
    ctx.setLineDash([]);
    const fs=Math.max(11,Math.round(vw*0.03));
    ctx.font=`bold ${fs}px DM Sans,sans-serif`;
    ctx.fillStyle='rgba(255,255,255,0.92)';
    ctx.textAlign='right';ctx.fillText('WRIST',cx-rx-6,cy+5);
    ctx.textAlign='left';ctx.fillText('ELBOW',cx+rx+6,cy+5);
    const pulse=0.75+0.25*Math.abs(Math.sin(Date.now()/500));
    ctx.beginPath();ctx.arc(cx,cy,Math.max(5,vw*0.012)*pulse,0,Math.PI*2);
    ctx.fillStyle='rgba(46,196,182,0.85)';ctx.fill();
    st.cameraAnimFrame=requestAnimationFrame(draw);
  }
  draw();
}

  { tone: 4,  r: 201, g: 171, b: 137 }, // #c9ab89 — medium warm
  { tone: 5,  r: 161, g: 128, b: 91  }, // #a1805b — medium-deep warm-golden
  { tone: 6,  r: 129, g: 93,  b: 58  }, // #815d3a — deep warm-brown
  { tone: 7,  r: 113, g: 74,  b: 53  }, // #714a35 — deep reddish-brown
  { tone: 8,  r: 85,  g: 55,  b: 43  }, // #55372b — very deep brown
  { tone: 9,  r: 56,  g: 42,  b: 36  }, // #382a24 — very deep near-black
  { tone: 10, r: 47,  g: 39,  b: 34  }  // #2f2722 — deepest brown-black
];
const classifyMonkToneFromPixels = (imageDataURL) => {
  return new Promise((resolve) => {
    const img = new Image();
    img.onload = () => {
      const W = img.width;
      const H = img.height;
      const canvas = document.createElement('canvas');
      canvas.width = W;
      canvas.height = H;
      const ctx = canvas.getContext('2d');
      ctx.drawImage(img, 0, 0);

      // ── STEP 1: MULTI-ZONE SAMPLING ─────────────────────────────────
      // 3 overlapping vertical strips across the arm centre.
      // Median-weighted to reduce edge/background noise.
      const zones = [
        { x1: W*0.20, x2: W*0.45, y1: H*0.25, y2: H*0.75 },
        { x1: W*0.35, x2: W*0.65, y1: H*0.25, y2: H*0.75 },
        { x1: W*0.55, x2: W*0.80, y1: H*0.25, y2: H*0.75 },
      ];
      const zoneResults = [];
      for (const zone of zones) {
        const x = Math.round(zone.x1), y = Math.round(zone.y1);
        const w = Math.round(zone.x2 - zone.x1), h = Math.round(zone.y2 - zone.y1);
        if (w <= 0 || h <= 0) continue;
        const imageData = ctx.getImageData(x, y, w, h);
        const pixels = imageData.data;
        let sumR=0,sumG=0,sumB=0,count=0;
        let specR=0,specG=0,specB=0,specCount=0;
        for (let i=0; i<pixels.length; i+=16) {
          const r=pixels[i],g=pixels[i+1],b=pixels[i+2],a=pixels[i+3];
          if (a < 200) continue;
          const brightness = (r+g+b) / 3;
          // Collect specular highlights for illuminant estimation
          if (brightness > 220) { specR+=r;specG+=g;specB+=b;specCount++;continue; }
          if (brightness < 30) continue;
          // Skin pixel filter: reject over-saturated (clothing) and wrong channel ratios
          const maxC=Math.max(r,g,b), minC=Math.min(r,g,b);
          const saturation = maxC===0 ? 0 : (maxC-minC)/maxC;
          if (saturation > 0.55) continue;
          if (saturation < 0.04 && brightness > 50) continue;
          if (brightness > 120 && r < g) continue;
          if (r < b - 10) continue;
          sumR+=r;sumG+=g;sumB+=b;count++;
        }
        if (count < 10) continue;
        zoneResults.push({
          r:sumR/count, g:sumG/count, b:sumB/count, count,
          specR: specCount>0 ? specR/specCount : null,
          specG: specCount>0 ? specG/specCount : null,
          specB: specCount>0 ? specB/specCount : null,
          specCount
        });
      }
      if (zoneResults.length === 0) { resolve(null); return; }

      // ── STEP 2: WEIGHTED AVERAGE ACROSS ZONES ───────────────────────
      let totalWeight=0, weightedR=0, weightedG=0, weightedB=0;
      let allSpecR=0, allSpecG=0, allSpecB=0, totalSpec=0;
      for (const z of zoneResults) {
        weightedR+=z.r*z.count; weightedG+=z.g*z.count; weightedB+=z.b*z.count;
        totalWeight+=z.count;
        if (z.specR!==null) { allSpecR+=z.specR*z.specCount; allSpecG+=z.specG*z.specCount; allSpecB+=z.specB*z.specCount; totalSpec+=z.specCount; }
      }
      let avgR=weightedR/totalWeight, avgG=weightedG/totalWeight, avgB=weightedB/totalWeight;

      // ── STEP 3: ILLUMINANT ESTIMATION ───────────────────────────────
      // Grey World: assumes average scene colour should be neutral grey.
      const gwGrey=(avgR+avgG+avgB)/3;
      const gwR=gwGrey/Math.max(avgR,1), gwG=gwGrey/Math.max(avgG,1), gwB=gwGrey/Math.max(avgB,1);
      // Specular highlights: bright highlights approximate light colour directly.
      let illumR=gwR, illumG=gwG, illumB=gwB;
      if (totalSpec >= 5) {
        const sR=allSpecR/totalSpec, sG=allSpecG/totalSpec, sB=allSpecB/totalSpec;
        const sGrey=(sR+sG+sB)/3;
        const specScaleR=sGrey/Math.max(sR,1), specScaleG=sGrey/Math.max(sG,1), specScaleB=sGrey/Math.max(sB,1);
        // Specular is more direct — weight it 65%
        illumR=gwR*0.35+specScaleR*0.65;
        illumG=gwG*0.35+specScaleG*0.65;
        illumB=gwB*0.35+specScaleB*0.65;
      }

      // ── STEP 4: VON KRIES CHROMATIC ADAPTATION ──────────────────────
      // Apply illuminant correction, clamped to ±40% to prevent over-correction.
      const clamp=(v,mn,mx)=>Math.max(mn,Math.min(mx,v));
      const scaleR=clamp(illumR,0.60,1.40), scaleG=clamp(illumG,0.60,1.40), scaleB=clamp(illumB,0.60,1.40);
      const corrR=clamp(Math.round(avgR*scaleR),0,255);
      const corrG=clamp(Math.round(avgG*scaleG),0,255);
      const corrB=clamp(Math.round(avgB*scaleB),0,255);

      // ── STEP 5: MST MATCHING ─────────────────────────────────────────
      // Euclidean distance in RGB; red channel weighted (most discriminative for skin).
      let nearest=1, minDist=Infinity;
      for (const mst of MONK_TONES) {
        const dist=Math.sqrt(Math.pow((corrR-mst.r)*1.1,2)+Math.pow(corrG-mst.g,2)+Math.pow(corrB-mst.b,2));
        if (dist<minDist) { minDist=dist; nearest=mst.tone; }
      }

      // ── STEP 6: BRIGHTNESS SANITY CHECKS ────────────────────────────
      // Raw brightness is a lighting-independent reality check.
      // Very bright raw average = objectively light skin regardless of cast.
      // Very dark raw average = objectively dark skin — don't over-correct.
      const rawBrightness=(avgR+avgG+avgB)/3;
      if (rawBrightness>210 && nearest>2) nearest=Math.min(nearest,2);
      if (rawBrightness>185 && nearest>3) nearest=Math.min(nearest,3);
      if (rawBrightness>160 && nearest>4) nearest=Math.min(nearest,4);
      if (rawBrightness>130 && nearest>6) nearest=Math.min(nearest,6);
      if (rawBrightness<60  && nearest<7) nearest=Math.max(nearest,7);
      if (rawBrightness<40  && nearest<8) nearest=Math.max(nearest,8);
      if (rawBrightness<25  && nearest<9) nearest=Math.max(nearest,9);

      resolve(nearest);
    };
    img.onerror = () => resolve(null);
    img.src = imageDataURL;
  });
};
const resizeImageForAnalysis = (dataURL) => new Promise(resolve => {
  const img = new Image();
  img.onload = () => {
    const maxW = 1024;
    const s = img.width > maxW ? maxW / img.width : 1;
    const c = document.createElement('canvas');
    c.width = Math.round(img.width * s);
    c.height = Math.round(img.height * s);
    c.getContext('2d').drawImage(img, 0, 0, c.width, c.height);
    resolve(c.toDataURL('image/jpeg', 0.85));
  };
  img.src = dataURL;
});
const analyseArmPhoto = async (imageDataURL) => {
  const resized = await resizeImageForAnalysis(imageDataURL);
  // Run pixel sampling and worker call in parallel
  const [pixelResult, workerResult] = await Promise.allSettled([
    classifyMonkToneFromPixels(resized),
    (async () => {
      const [header, base64Data] = resized.split(',');
      const mimeType = header.match(/:(.*?);/)[1] || 'image/jpeg';
      const response = await fetch('https://tmc-skin-proxy.githubadmin-ff3.workers.dev', {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({imageBase64: base64Data, mimeType})
      });
      if (!response.ok) throw new Error('Worker error ' + response.status);
      return await response.json();
    })()
  ]);
  const worker = workerResult.status === 'fulfilled' ? workerResult.value : null;
  // Prefer pixel-sampled tone; fall back to worker visual estimate
  const pixelTone = pixelResult.status === 'fulfilled' ? pixelResult.value : null;
  const monkTone = pixelTone || (worker && worker.monkTone) || 3;
  return {
    monkTone,
    monkToneSource: pixelTone ? 'pixel_sampling' : 'ai_visual',
    moleCount: worker ? worker.moleCount : -1,
    moleCountCategory: worker ? worker.moleCountCategory : 'under7',
    confidence: worker ? worker.confidence : 'low',
    lightingQuality: worker ? worker.lightingQuality : 'unknown',
    analysisNotes: worker ? worker.analysisNotes : 'Worker unavailable'
  };
};
function handleAnalysisResult(result){
  const mst=result.monkTone?Math.min(10,Math.max(1,parseInt(result.monkTone))):null;
  const moleRaw=result.moleCountCategory?result.moleCountCategory.toLowerCase():null;
  const confidence=result.confidence?result.confidence.toLowerCase():'low';
  // Bataille et al. 2015 (King's College London): arm mole count predicts body burden
  // 7-10 arm moles → ~50+ body moles; 11+ arm → elevated melanoma risk
  const moleMap={under7:'under10','7to10':'10to50','11plus':'50plus'};
  const moleCountAnswer=moleRaw?(moleMap[moleRaw]||'under10'):null;
  if(mst)st.skinType=mst;
  if(moleCountAnswer)st.answers.mole_count=moleCountAnswer;
  st.skinAnalysis={mst,monkToneSource:result.monkToneSource||null,moleRaw,moleCountCategory:moleRaw,moleCount:result.moleCount!=null?result.moleCount:-1,moleCountAnswer,confidence,photoDataUrl:st.capturedPhoto};
  showAnalysisResults();
}

            st.showTravelBanner=true;
            const up2={...up,awayFromHome:false};saveProfile(up2);st.profile=up2;
            const banner=document.querySelector('.travel-banner');
            if(!banner){render();return;}
          }else if(ts.isAway&&!up.awayFromHome){
            const up2={...up,awayFromHome:true};saveProfile(up2);st.profile=up2;
          }
        }
        const wd=await fetchWeatherAndUV(lat,lon);
        if(wd)updateWeatherUI(wd,geo);return;
      }catch(e){}
    }
    if(p.lat&&p.lon){try{const wd=await fetchWeatherAndUV(p.lat,p.lon);if(wd)updateWeatherUI(wd,{city:p.city});}catch(e){}return;}
  }
  if(p.lat&&p.lon){try{const wd=await fetchWeatherAndUV(p.lat,p.lon);if(wd)updateWeatherUI(wd,{city:p.city});}catch(e){}return;}
  if(p.postcode){
    const coords=await fetchCoordinatesFromPostcode(p.postcode);
    if(coords){try{const wd=await fetchWeatherAndUV(coords.lat,coords.lon);if(wd){updateWeatherUI(wd,{city:`Based on your postcode (${p.postcode.toUpperCase()})`});return;}}catch(e){}}
    showPostcodeUVError(p);
  }
}
// ===== PROFILE MANAGEMENT =====
function buildProfile(){
  return{
    version:'0.3',name:st.name,email:st.email,postcode:st.postcode,
    consentData:st.consentData,consentMarketing:st.consentMarketing,
    consentLocation:st.consentLocation,consentTravel:st.consentTravel,
    skinType:st.skinType,skinAnalysis:st.skinAnalysis||null,
    answers:{...st.answers},abcdeAnswers:{...st.abcdeAnswers},
    riskScore:st.riskScore,riskLevel:st.riskLevel,
    lat:st.lat,lon:st.lon,city:st.city,country:st.country,country_code:st.country_code,
    homeCountry:st.country_code||(st.postcode?'gb':''),locationTimestamp:st.lat?Date.now():null,
    profileCreated:new Date().toISOString().split('T')[0],lastCheckDate:null,awayFromHome:false,
  };
}
function finishOnboarding(){
  st.riskScore=calculateRiskScore(st.answers,st.abcdeAnswers,st.skinType,st.skinAnalysis);st.riskLevel=getRiskLevel(st.riskScore);navigate('loading');
}
function startLoadingMessages(){
  const msgs=['Analysing your risk profile…','Comparing against UK skin cancer risk data…','Identifying your key risk factors…','Calculating personalised UV adjustments…','Preparing your Skin Safety Dashboard…'];
  let i=0;const msgEl=document.getElementById('loadingMsg');
  const iv=setInterval(()=>{
    i++;if(i<msgs.length&&msgEl){msgEl.style.animation='none';msgEl.offsetHeight;msgEl.style.animation='fadeIn .4s ease-out';msgEl.textContent=msgs[i];}
    if(i>=msgs.length-1){clearInterval(iv);setTimeout(()=>{const p=buildProfile();saveProfile(p);st.profile=p;navigate('homepage');},900);}
  },900);
}
function dismissTravelBanner(){setTravelDismissed();st.showTravelBanner=false;const b=document.querySelector('.travel-banner');if(b)b.remove();}
function showPostcodeUVError(p){
  const loadEl=document.getElementById('hp-uv-loading'),dataEl=document.getElementById('hp-uv-data');
  if(loadEl)loadEl.style.display='none';
  if(dataEl){dataEl.style.display='block';dataEl.innerHTML=`<div class="uv-unavailable"><div class="uv-unavailable-icon">&#9888;&#65039;</div><div style="font-size:14px;font-weight:600;color:var(--tmc-navy)">UV data unavailable</div><div style="margin-top:4px;font-size:12px">Enable location or check postcodes.io is available.</div><button class="btn-secondary" style="margin-top:12px;font-size:13px;padding:10px" onclick="retryPostcodeUV()">Retry &#8634;</button></div><div class="uv-spf-rec" style="margin-top:12px">${getDefaultSPFRec(p.skinType)}</div>`;}
}
async function retryPostcodeUV(){
  const p=st.profile;if(!p||!p.postcode)return;
  const loadEl=document.getElementById('hp-uv-loading'),dataEl=document.getElementById('hp-uv-data');
  if(loadEl){loadEl.style.display='block';loadEl.className='uv-loading-state';loadEl.innerHTML=`<div class="uv-loading-spinner"></div><div style="font-size:13px;color:var(--tmc-gray-400)">Retrying…</div><div class="uv-spf-rec" style="margin-top:12px">${getDefaultSPFRec(p.skinType)}</div>`;}
  if(dataEl)dataEl.style.display='none';
  const coords=await fetchCoordinatesFromPostcode(p.postcode);
  if(coords){try{const wd=await fetchWeatherAndUV(coords.lat,coords.lon);if(wd){updateWeatherUI(wd,{city:`Based on your postcode (${p.postcode.toUpperCase()})`});return;}}catch(e){}}
  showPostcodeUVError(p);
}
function resetProfile(){if(confirm('This will clear your profile and restart the questionnaire. Are you sure?')){clearProfile();stopCamera();window.activeCameraStream=null;Object.assign(st,{profile:null,screen:'welcome',history:['welcome'],weatherData:null,currentCity:'',skinAnalysis:null,capturedPhoto:null,cameraAnimFrame:null});render();}}
function afterLocationConsent(){if(st.consentLocation)navigate('consent_travel');else navigate('consent_notifications');}
// ===== MAIN RENDER =====
function render(){
  const app=document.getElementById('app');
  const dirClass=st.navDirection==='back'?'screen-slide-left':'screen-slide-right';
  let html='';
  switch(st.screen){
    case 'welcome':html=renderWelcome();break;
    case 'email':html=renderEmail();break;
    case 'consent':html=renderConsent();break;
    case 'arm_camera':html=renderArmCamera();break;
    case 'questionnaire':html=renderQuestionnaire();break;
    case 'abcde':html=renderABCDE();break;
    case 'consent_location':html=renderConsentLocation();break;
    case 'consent_travel':html=renderConsentTravel();break;
    case 'consent_notifications':html=renderConsentNotifications();break;
    case 'loading':html=renderLoading();break;
    case 'homepage':html=renderHomepage();break;
    default:html=renderWelcome();
  }
  app.innerHTML=`<div class="${dirClass}">${html}</div>`;
  bindEvents();
  if(st.screen==='loading')startLoadingMessages();
  if(st.screen==='homepage')setTimeout(()=>{animateRiskGaugeIfOpen();initHomepageAsync();},100);
}
// ===== EVENT BINDING =====
function bindEvents(){
  // Email screen
  const nameIn=document.getElementById('nameInput'),emailIn=document.getElementById('emailInput'),postIn=document.getElementById('postcodeInput'),emailNext=document.getElementById('emailNext');
  if(nameIn&&emailIn&&postIn&&emailNext){
    const chk=()=>{st.name=nameIn.value.trim();st.email=emailIn.value.trim();st.postcode=postIn.value.trim();emailNext.disabled=!(st.name&&st.email.includes('@')&&st.email.includes('.')&&st.postcode.length>=2);};
    nameIn.addEventListener('input',chk);emailIn.addEventListener('input',chk);postIn.addEventListener('input',chk);
    emailNext.addEventListener('click',()=>navigate('consent'));chk();
  }
  // Consent screen
  const consentDataEl=document.getElementById('consentData'),consentMktEl=document.getElementById('consentMarketing'),consentNext=document.getElementById('consentNext');
  if(consentDataEl)consentDataEl.addEventListener('click',()=>{st.consentData=!st.consentData;render();});
  if(consentMktEl)consentMktEl.addEventListener('click',()=>{st.consentMarketing=!st.consentMarketing;render();});
  if(consentNext)consentNext.addEventListener('click',()=>navigate('arm_camera'));
  // Questionnaire screen
  document.querySelectorAll('.option-card[data-answer]').forEach(c=>c.addEventListener('click',()=>{st.answers[questions[st.currentQuestion].id]=c.dataset.answer;render();}));
  const questionNext=document.getElementById('questionNext');
  if(questionNext)questionNext.addEventListener('click',()=>{
    let next=st.currentQuestion+1;
    while(next<questions.length&&shouldSkipQuestion(questions[next]))next++;
    if(next<questions.length){st.currentQuestion=next;render();}else navigate('abcde');
  });
  // ABCDE screen
  document.querySelectorAll('[data-abcde]').forEach(c=>c.addEventListener('click',()=>{st.abcdeAnswers[c.dataset.abcde]=!st.abcdeAnswers[c.dataset.abcde];render();}));
  // Location consent toggle
  const locToggle=document.getElementById('locationToggle');
  if(locToggle){
    locToggle.addEventListener('change',async()=>{
      if(locToggle.checked){
        try{
          const pos=await getCurrentPosition();
          st.consentLocation=true;st.lat=pos.coords.latitude;st.lon=pos.coords.longitude;
          const geo=await reverseGeocode(st.lat,st.lon);st.city=geo.city;st.country=geo.country;st.country_code=geo.country_code;
          render();
        }catch(e){locToggle.checked=false;st.consentLocation=false;showToast('Location permission denied');}
      }else{st.consentLocation=false;st.lat=null;st.lon=null;render();}
    });
  }
  // Travel consent toggle
  const travToggle=document.getElementById('travelToggle');
  if(travToggle)travToggle.addEventListener('change',()=>{st.consentTravel=travToggle.checked;});
}
// ===== DEV TOOLS =====
function devSimulateHolidayReturn(){
  const p=st.profile;if(!p)return;
  const now=Date.now();let h=getLocationHistory();
  for(let i=0;i<5;i++)h.push({lat:40.416775,lon:-3.703790,country:'Spain',country_code:'es',timestamp:now-(6-i)*24*60*60*1000});
  h.push({lat:51.46,lon:-0.306,country:'United Kingdom',country_code:'gb',timestamp:now});
  if(h.length>90)h=h.slice(-90);saveLocationHistory(h);
  const up={...p,awayFromHome:true,homeCountry:p.homeCountry||'gb'};saveProfile(up);st.profile=up;
  const ts=checkTravelStatus(up);
  if(ts.justReturned&&shouldShowTravelBanner()){
    const up2={...up,awayFromHome:false};saveProfile(up2);st.profile=up2;st.showTravelBanner=true;render();
  }else{showToast('Travel state: away='+ts.isAway+', returned='+ts.justReturned);}
}
function devResetTravel(){
  localStorage.removeItem('tmcLocationHistory');localStorage.removeItem('tmcTravelBannerDismissed');
  const p=st.profile;if(p){const up={...p,awayFromHome:false};saveProfile(up);st.profile=up;}
  st.showTravelBanner=false;const b=document.querySelector('.travel-banner');if(b)b.remove();showToast('Travel data reset');
}
// ===== INIT =====
function init(){
  const p=getProfile();
  if(p&&p.version==='0.3'){
    st.profile=p;st.screen='homepage';st.history=['homepage'];
    if(p.awayFromHome&&shouldShowTravelBanner())st.showTravelBanner=true;
    render();
  }else{
    render();
  }
}
init();
</script>
